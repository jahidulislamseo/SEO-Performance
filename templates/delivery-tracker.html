<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Delivery Follow-Up Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
/* ── BASE & GLOBAL ── */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Manrope',sans-serif;background:#030712;color:#f8fafc;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(95,133,162,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(95,133,162,.03) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:0}
.g1{position:fixed;top:-200px;left:-100px;width:600px;height:600px;background:radial-gradient(circle,rgba(61,111,155,.16) 0%,transparent 70%);pointer-events:none;z-index:0}
.g2{position:fixed;bottom:-150px;right:-80px;width:500px;height:500px;background:radial-gradient(circle,rgba(15,118,110,.10) 0%,transparent 70%);pointer-events:none;z-index:0}

@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.5)}}
@keyframes cardIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes mIn{from{opacity:0;transform:scale(.95) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}

/* HEADER */
.hdr{position:sticky;top:0;z-index:50;height:68px;padding:0 32px;display:flex;align-items:center;justify-content:space-between;gap:12px;background:rgba(3,7,18,.75);backdrop-filter:blur(24px);border-bottom:1px solid rgba(148,163,184,.12)}
.hl{display:flex;align-items:center;gap:12px}
.logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#2f5d8a,#5f85a2);display:flex;align-items:center;justify-content:center;font-size:19px;box-shadow:0 14px 28px rgba(18,33,54,.35)}
.htitle{font-size:18px;font-weight:900;letter-spacing:-.5px;background:linear-gradient(135deg,#f8fafc,#c7d3df,#6f879c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hsub{font-size:11px;color:#94a3b8;font-weight:600}
.hr{display:flex;align-items:center;gap:8px}
.hbtn{padding:6px 12px;border-radius:9px;background:rgba(61,111,155,.12);border:1px solid rgba(95,133,162,.28);color:#c4d4e2;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;transition:all .2s;text-decoration:none}
.hbtn:hover{background:rgba(61,111,155,.2);border-color:rgba(95,133,162,.45)}

/* MAIN */
.main{position:relative;z-index:5;padding:24px 32px;max-width:1600px;margin:0 auto}

/* KPI BAR */
.kpi-bar{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:24px}
.kpi-box{background:rgba(17,24,39,0.7);backdrop-filter:blur(10px);border:1px solid rgba(148,163,184,.12);border-radius:16px;padding:16px 20px;animation:cardIn .4s ease}
.kpi-num{font-size:28px;font-weight:900;letter-spacing:-1px;font-variant-numeric:tabular-nums}
.kpi-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:#94a3b8;margin-top:4px}

/* CONTROLS */
.controls{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.srch-wrap{position:relative;display:flex;align-items:center}
.srch-icon{position:absolute;left:12px;font-size:13px;color:#94a3b8}
.srch{padding:9px 12px 9px 34px;border-radius:12px;background:rgba(17,24,39,0.7);border:1px solid rgba(148,163,184,.18);color:#f1f5f9;font-size:13px;font-weight:600;font-family:inherit;outline:none;width:280px;transition:all .2s}
.srch:focus{border-color:rgba(59,130,246,0.4);background:rgba(17,24,39,0.9)}
.sel{padding:9px 12px;border-radius:12px;background:rgba(17,24,39,0.7);border:1px solid rgba(148,163,184,.18);color:#f1f5f9;font-size:12px;font-weight:700;font-family:inherit;outline:none;cursor:pointer}
.fu-tabs{display:flex;gap:6px;flex-wrap:wrap}
.fu-tab{padding:8px 14px;border-radius:99px;border:1px solid rgba(148,163,184,.15);background:rgba(255,255,255,.03);color:#94a3b8;font-size:10px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .2s}
.fu-tab:hover,.fu-tab.active{background:rgba(59,130,246,.15);color:#fff;border-color:rgba(59,130,246,.3)}

/* DELIVERY LIST - BALANCED ROW LAYOUT */
.dt-list{display:flex;flex-direction:column;gap:16px}
.dt-item{background:rgba(17,24,39,0.7);backdrop-filter:blur(12px);border:1px solid rgba(148,163,184,.1);border-radius:20px;padding:22px 28px;display:grid;grid-template-columns:280px 1fr 300px 180px;align-items:center;gap:32px;transition:all 0.3s ease;position:relative;overflow:hidden;animation:cardIn .4s ease}
.dt-item:hover{border-color:rgba(95,133,162,.3);transform:translateX(4px);background:rgba(31,41,55,0.4)}
.dt-item::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:#3b82f6;opacity:0;transition:opacity 0.3s}
.dt-item:hover::before{opacity:1}
.dt-item.sold{border-color:rgba(245,158,11,.25);background:rgba(245,158,11,.04)}

.dt-top{display:flex;align-items:center;gap:16px}
.dt-av{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#fff;flex-shrink:0}
.dt-client{font-size:16px;font-weight:800;color:#f8fafc;margin-bottom:2px}
.dt-meta{font-size:11px;color:#94a3b8;display:flex;gap:6px}

.dt-info-grid{display:flex;gap:32px}
.dt-field{display:flex;flex-direction:column;gap:4px}
.dt-field-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:#64748b;opacity:0.6}
.dt-field-val{font-size:13px;font-weight:700;color:#cbd5e1}

.dt-progress-section{display:flex;flex-direction:column;gap:10px}
.dt-progress-header{display:flex;justify-content:space-between;align-items:center}
.dt-progress-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:#94a3b8}
.dt-progress-count{font-size:11px;font-weight:900;color:#3b82f6}

.fu-dots{display:flex;gap:6px}
.fu-dot{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;cursor:pointer;border:1px solid rgba(148,163,184,0.1);background:rgba(148,163,184,0.05);color:#94a3b8;transition:all .2s}
.fu-dot.done{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.25);color:#34d399}
.fu-dot.sold{background:rgba(245,158,11,.15);border-color:rgba(245,158,11,.3);color:#fbbf24}

.dt-right-col{display:flex;flex-direction:column;align-items:flex-end;gap:12px}
.dt-price-row{display:flex;align-items:center;gap:12px}
.dt-price{font-size:22px;font-weight:900;color:#10b981}
.dt-status-pill{padding:4px 12px;border-radius:6px;font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:0.5px}

.sp-not-started{background:rgba(239,68,68,0.1);color:#f87171;border:1px solid rgba(239,68,68,0.2)}
.sp-in-progress{background:rgba(59,130,246,0.1);color:#a5b4fc;border:1px solid rgba(59,130,246,0.2)}
.sp-complete{background:rgba(16,185,129,0.1);color:#34d399;border:1px solid rgba(16,185,129,0.2)}
.sp-sold{background:rgba(245,158,11,0.1);color:#fbbf24;border:1px solid rgba(245,158,11,0.2)}

.dt-actions{display:flex;gap:8px}
.dt-btn{padding:7px 14px;border-radius:9px;font-size:10px;font-weight:800;cursor:pointer;border:1px solid transparent;transition:all .2s;display:flex;align-items:center;gap:4px;font-family:inherit}
.dt-btn.message{background:rgba(59,130,246,.1);color:#60a5fa;border-color:rgba(59,130,246,.25)}
.dt-btn.sold-btn{background:rgba(245,158,11,.1);color:#f59e0b;border-color:rgba(245,158,11,.25)}

/* MESSAGE MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(14px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.msg-modal{background:#090f1d;border:1px solid rgba(148,163,184,.18);border-radius:26px;padding:32px;width:100%;max-width:560px;box-shadow:0 40px 100px rgba(0,0,0,.65);animation:mIn .3s cubic-bezier(.4,0,.2,1)}

.footer{text-align:center;padding:24px;border-top:1px solid rgba(148,163,184,.12);color:#64748b;font-size:11px;margin-top:32px}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:12px;background:rgba(13,20,42,.97);border:1px solid rgba(148,163,184,.18);font-size:12px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.5);display:flex;align-items:center;gap:8px;z-index:200;animation:cardIn .3s ease;color:#f1f5f9}
</style>
</head>
<body>
<div class="g1"></div><div class="g2"></div>
<div id="root"></div>

<script type="text/babel">
const GRADIENTS = [
  'linear-gradient(135deg,#2f5d8a,#5f85a2)',
  'linear-gradient(135deg,#0f766e,#10b981)',
  'linear-gradient(135deg,#7c3aed,#a78bfa)',
  'linear-gradient(135deg,#b45309,#f59e0b)',
  'linear-gradient(135deg,#be123c,#f43f5e)',
  'linear-gradient(135deg,#1d4ed8,#60a5fa)',
];
const gradFor = (s) => GRADIENTS[s.charCodeAt(0) % GRADIENTS.length];
const initials = (s) => s.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

const FOLLOW_UP_TEMPLATES = [
  "Hi {client}, I'm following up on your {service} order (#{order}). Just checking in — have you had a chance to review the delivered work? We'd love your feedback! 😊",
  "Hello {client}! This is follow-up #2 for order #{order} ({service}). If you have any questions or need adjustments, feel free to reach out. We're here to help! ✅",
  "Hi {client}, checking in again on your {service} (Order #{order}). Just a friendly nudge — any feedback or approval would be greatly appreciated! 🙏",
  "Hello {client}! Follow-up #4 for #{order} ({service}). We noticed we haven't heard back — please let us know if everything is satisfactory or if you need any revision. 📩",
  "Hi {client}, this is our final follow-up for order #{order} ({service}). Please review and share your feedback at your earliest convenience. Thank you for working with us! 🌟",
];

const SAMPLE_DATA = [
  { id:'ORD-4821', client:'Dhaka Restaurant & Catering', service:'Local SEO Package', member:'Jahidul Islam', team:'Geo Rankers', amt:120, date:'Apr 10', followups:[true,true,false,false,false], remark:'Client is slow to respond', sold:false },
  { id:'ORD-4790', client:'RajShahi Travels Agency', service:'GMB Optimization × 2', member:'Rafiq Ahmed', team:'Geo Rankers', amt:90, date:'Apr 8', followups:[true,true,true,true,true], remark:'Converted! Client ordered again 🎉', sold:true },
  { id:'ORD-4755', client:'Chittagong Mart Online', service:'National SEO — Tier 2', member:'Sara Rahman', team:'Rank Riser', amt:250, date:'Apr 5', followups:[true,false,false,false,false], remark:'', sold:false },
  { id:'ORD-4820', client:'Sylhet Coffee House', service:'Citation Building × 50', member:'Nadia Khan', team:'Rank Riser', amt:75, date:'Apr 12', followups:[true,true,true,false,false], remark:'Satisfied, asked for quote', sold:false },
  { id:'ORD-4800', client:'Khulna Tech Solutions', service:'Press Release × 3', member:'Omar Sheikh', team:'Search Apex', amt:180, date:'Apr 7', followups:[false,false,false,false,false], remark:'', sold:false },
  { id:'ORD-4810', client:'Barishal Fashion Hub', service:'E-commerce SEO Setup', member:'Priya Das', team:'Search Apex', amt:320, date:'Apr 9', followups:[true,true,true,true,false], remark:'Requested revision first', sold:false },
  { id:'ORD-4815', client:'Mymensingh Auto Parts', service:'SMM Package — 1 Month', member:'Tanvir Hossain', team:'SMM', amt:200, date:'Apr 11', followups:[true,true,false,false,false], remark:'Happy with results', sold:false },
];

const App = () => {
  const [data, setData] = React.useState(SAMPLE_DATA);
  const [search, setSearch] = React.useState('');
  const [fuFilter, setFuFilter] = React.useState('');
  const [memberFilter, setMemberFilter] = React.useState('');
  const [modal, setModal] = React.useState(null); // { item, step }
  const [toast, setToast] = React.useState('');

  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(''), 3000); };

  const toggleFu = (id, idx) => {
    setData(prev => prev.map(d => d.id===id ? { ...d, followups: d.followups.map((v,i)=>i===idx?!v:v) } : d));
  };

  const fuCount = (fu) => fu.filter(Boolean).length;

  const filtered = data.filter(d => {
    const q = search.toLowerCase();
    const matchSearch = !search || d.client.toLowerCase().includes(q) || d.id.toLowerCase().includes(q) || d.member.toLowerCase().includes(q);
    const matchMember = !memberFilter || d.member === memberFilter;
    const matchFu = fuFilter === '' ? true : fuFilter === '6' ? d.sold : fuCount(d.followups) === parseInt(fuFilter);
    return matchSearch && matchMember && matchFu;
  });

  const members = [...new Set(SAMPLE_DATA.map(d=>d.member))];
  const total = data.length;
  const noFu = data.filter(d=>fuCount(d.followups)===0).length;
  const inProg = data.filter(d=>fuCount(d.followups)>0&&fuCount(d.followups)<5).length;
  const done5 = data.filter(d=>fuCount(d.followups)===5).length;
  const sold = data.filter(d=>d.sold).length;
  const withRmk = data.filter(d=>d.remark).length;

  const modalTemplate = modal ? FOLLOW_UP_TEMPLATES[modal.step].replace('{client}',modal.item.client).replace('{service}',modal.item.service).replace('{order}',modal.item.id) : '';

  return (
    <>
      {/* Header */}
      <header className="hdr">
        <div className="hl">
          <div className="logo">📦</div>
          <div>
            <div className="htitle">Delivery Follow-Up Tracker</div>
            <div className="hsub">GEO Rankers Department · Client Follow-up Management</div>
          </div>
        </div>
        <div className="hr">
          <div className="live-pill"><div className="ldot"></div><span>Live Data</span></div>
          <button className="hbtn">↻ Refresh</button>
          <button className="hbtn purple">📥 Export CSV</button>
          <a className="hbtn green" href="index.html">← Dashboard</a>
        </div>
      </header>

      <div className="main">
        {/* KPI bar */}
        <div className="kpi-bar">
          <div className="kpi-box"><div className="kpi-num" style={{color:'#a5b4fc'}}>{total}</div><div className="kpi-lbl">Total Projects</div></div>
          <div className="kpi-box"><div className="kpi-num" style={{color:'#ef4444'}}>{noFu}</div><div className="kpi-lbl">Not Started</div></div>
          <div className="kpi-box"><div className="kpi-num" style={{color:'#60a5fa'}}>{inProg}</div><div className="kpi-lbl">Following Up</div></div>
          <div className="kpi-box"><div className="kpi-num" style={{color:'#10b981'}}>{done5}</div><div className="kpi-lbl">Completed (5)</div></div>
          <div className="kpi-box"><div className="kpi-num" style={{color:'#f59e0b'}}>{sold} 💰</div><div className="kpi-lbl">Sold / Success</div></div>
          <div className="kpi-box"><div className="kpi-num" style={{color:'#6366f1'}}>{withRmk}</div><div className="kpi-lbl">With Remarks</div></div>
        </div>

        {/* Controls */}
        <div className="controls">
          <div className="srch-wrap">
            <span className="srch-icon">🔍</span>
            <input className="srch" placeholder="Search client / order / member..." value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          <select className="sel" value={memberFilter} onChange={e=>setMemberFilter(e.target.value)}>
            <option value="">All Members</option>
            {members.map(m=><option key={m} value={m}>{m}</option>)}
          </select>
          <div className="fu-tabs">
            {[['','All'],['0','No Follow-up'],['1','1 Done'],['2','2 Done'],['3','3 Done'],['4','4 Done'],['5','5 ✓'],['6','Sold 💰']].map(([v,lbl])=>(
              <button key={v} className={`fu-tab${v==='0'?' f0':v==='5'?' f5':v==='6'?' f6':''}${fuFilter===v?' active':''}`} onClick={()=>setFuFilter(v)}>{lbl}</button>
            ))}
          </div>
          <div className="ctrl-right">
            <span className="badge">Showing <b>{filtered.length}</b> of {total}</span>
          </div>
        </div>

        {/* List */}
        <div className="dt-list">
          {filtered.map(item => {
            const fc = fuCount(item.followups);
            return (
              <div key={item.id} className={`dt-item ${item.sold ? 'sold' : ''}`}>
                {/* Column 1: Client Info */}
                <div className="dt-top">
                  <div className="dt-av" style={{ background: gradFor(item.client) }}>{initials(item.client)}</div>
                  <div className="dt-content">
                    <div className="dt-client">{item.client}</div>
                    <div className="dt-meta">
                      <span>#{item.id.slice(-5)}</span>
                      <span>·</span>
                      <span>{item.service}</span>
                    </div>
                  </div>
                </div>

                {/* Column 2: Member & Team */}
                <div className="dt-info-grid">
                  <div className="dt-field">
                    <div className="dt-field-lbl">Member</div>
                    <div className="dt-field-val">{item.member}</div>
                  </div>
                  <div className="dt-field">
                    <div className="dt-field-lbl">Team</div>
                    <div className="dt-field-val">{item.team}</div>
                  </div>
                </div>

                {/* Column 3: Progress */}
                <div className="dt-progress-section">
                  <div className="dt-progress-header">
                    <div className="dt-progress-label">Follow-up Progress</div>
                    <div className="dt-progress-count">{fc}/5</div>
                  </div>
                  <div className="fu-dots">
                    {item.followups.map((done, i) => (
                      <button 
                        key={i} 
                        className={`fu-dot ${item.sold ? 'sold' : done ? 'done' : 'pending'}`} 
                        onClick={() => toggleFu(item.id, i)}
                      >
                        {item.sold ? '💰' : done ? '✓' : i + 1}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Column 4: Right Section */}
                <div className="dt-right-col">
                  <div className="dt-price-row">
                    <div className="dt-price">${item.amt}</div>
                    {item.sold ? (
                      <span className="dt-status-pill sp-sold">💰 Sold</span>
                    ) : fc === 5 ? (
                      <span className="dt-status-pill sp-complete">✅ Complete</span>
                    ) : fc === 0 ? (
                      <span className="dt-status-pill sp-not-started">⏳ Not Started</span>
                    ) : (
                      <span className="dt-status-pill sp-in-progress">🔄 {fc}/5</span>
                    )}
                  </div>
                  <div className="dt-actions">
                    <button className="dt-btn message" onClick={() => setModal({ item, step: Math.min(fc, 4) })}>
                      📋 Message
                    </button>
                    <button className="dt-btn sold-btn" onClick={() => toggleSold(item.id)}>
                      {item.sold ? '↩️' : '💰 Sold'}
                    </button>
                  </div>
                </div>
              </div>
            );
          })}
          {filtered.length === 0 && (
            <div style={{ textAlign: 'center', padding: 48, color: '#64748b' }}>
              <div style={{ fontSize: 32, marginBottom: 10 }}>📦</div>
              <div style={{ fontWeight: 700 }}>No projects found matching filters.</div>
            </div>
          )}
        </div>
      </div>

      <footer className="footer">SEO Performance Hub · Delivery Tracker · GEO Rankers Dept · April 2026</footer>

      {/* Message modal */}
      <div className={`overlay${modal?' open':''}`} onClick={e=>e.target.classList.contains('overlay')&&setModal(null)}>
        {modal && (
          <div className="msg-modal">
            <div className="msg-title">📋 Follow-up Message</div>
            <div className="msg-sub">{modal.item.client} · {modal.item.id}</div>
            <div className="msg-steps">
              {[0,1,2,3,4].map(i=>(
                <button key={i} className={`msg-step${modal.step===i?' active':''}`} onClick={()=>setModal({...modal,step:i})}>
                  Follow-up {i+1}
                </button>
              ))}
            </div>
            <div className="msg-hint">Variables: <b style={{color:'#94a3b8'}}>{'{client}'}</b>, <b style={{color:'#94a3b8'}}>{'{order}'}</b>, <b style={{color:'#94a3b8'}}>{'{service}'}</b> auto-filled.</div>
            <textarea className="msg-textarea" defaultValue={modalTemplate} key={modal.step+''+modal.item.id}/>
            <div className="msg-actions">
              <button className="msg-close" onClick={()=>setModal(null)}>Cancel</button>
              <button className="msg-close" style={{background:'rgba(99,102,241,.12)',borderColor:'rgba(99,102,241,.3)',color:'#a5b4fc'}}>💾 Save Template</button>
              <button className="msg-copy" onClick={()=>{toggleFu(modal.item.id,modal.step);setModal(null);showToast('✅ Message copied & follow-up marked done!')}}>📋 Copy & Mark Done</button>
            </div>
          </div>
        )}
      </div>

      {toast && <div className="toast">{toast}</div>}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
