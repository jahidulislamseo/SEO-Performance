<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Employee Portal — GEO Rankers</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/static/css/colors_and_type.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Manrope',sans-serif;background:#09111f;color:#f1f5f9;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(95,133,162,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(95,133,162,.03) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:0}
.g1{position:fixed;top:-200px;left:-100px;width:600px;height:600px;background:radial-gradient(circle,rgba(61,111,155,.18) 0%,transparent 70%);pointer-events:none;z-index:0}
.g2{position:fixed;bottom:-150px;right:-80px;width:500px;height:500px;background:radial-gradient(circle,rgba(15,118,110,.12) 0%,transparent 70%);pointer-events:none;z-index:0}

@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.5)}}
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(200%)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ── LOGIN SCREEN ── */
.login-screen{display:grid;grid-template-columns:1fr 1fr;min-height:100vh;position:relative;z-index:5}
.lp-left{background:linear-gradient(135deg,rgba(18,32,54,.98),rgba(14,24,40,.98));border-right:1px solid rgba(148,163,184,.12);padding:48px;display:flex;flex-direction:column;justify-content:center}
.lpl-logo{display:flex;align-items:center;gap:10px;margin-bottom:40px}
.lpl-logo-icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#2f5d8a,#5f85a2);display:flex;align-items:center;justify-content:center;font-size:18px}
.lpl-logo-text{font-size:18px;font-weight:900;letter-spacing:-.3px;color:#f1f5f9}
.lpl-headline{font-size:38px;font-weight:900;letter-spacing:-1.5px;background:linear-gradient(135deg,#f3f6fa,#c6d2de,#879caf);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;margin-bottom:14px}
.lpl-sub{font-size:14px;color:#94a3b8;line-height:1.7;margin-bottom:40px}
.lpl-features{display:flex;flex-direction:column;gap:18px;margin-bottom:40px}
.lpl-feat{display:flex;align-items:flex-start;gap:14px}
.lpl-feat-icon{width:38px;height:38px;border-radius:10px;background:rgba(47,93,138,.2);border:1px solid rgba(95,133,162,.25);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.lpl-feat-title{font-size:13px;font-weight:800;color:#f1f5f9;margin-bottom:2px}
.lpl-feat-sub{font-size:11px;color:#64748b;line-height:1.5}
.lpl-live{display:flex;align-items:center;gap:8px;font-size:11px;color:#94a3b8;font-weight:600}
.lpl-dot{width:6px;height:6px;border-radius:50%;background:#10b981;box-shadow:0 0 8px rgba(16,185,129,.6);animation:pulse 2s infinite}

.lp-right{display:flex;align-items:center;justify-content:center;padding:48px}
.lc-card{background:rgba(14,24,38,.97);border:1px solid rgba(148,163,184,.18);border-radius:24px;padding:36px;width:100%;max-width:400px;animation:cardIn .5s ease}
.lc-brand{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.lc-logo-icon{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,#2f5d8a,#5f85a2);display:flex;align-items:center;justify-content:center;font-size:16px}
.lc-brand-name{font-size:14px;font-weight:900;color:#f1f5f9}
.lc-brand-sub{font-size:10px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.lc-title{font-size:24px;font-weight:900;letter-spacing:-.5px;color:#f1f5f9;margin-bottom:4px}
.lc-desc{font-size:13px;color:#94a3b8;margin-bottom:28px}
.lf-group{margin-bottom:16px}
.lf-label{font-size:11px;font-weight:800;color:#cbd5e1;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;display:block}
.lf-input-wrap{position:relative;display:flex;align-items:center}
.lf-icon{position:absolute;left:12px;color:#64748b;display:flex;align-items:center}
.lf-input{width:100%;padding:11px 12px 11px 36px;border-radius:11px;background:rgba(255,255,255,.04);border:1px solid rgba(148,163,184,.2);color:#f1f5f9;font-size:13px;font-weight:600;font-family:inherit;outline:none;transition:all .2s}
.lf-input:focus{border-color:rgba(95,133,162,.5);background:rgba(255,255,255,.07)}
.lf-input::placeholder{color:#475569}
.lf-submit{width:100%;padding:13px;border-radius:12px;background:linear-gradient(135deg,#2f5d8a,#5f85a2);border:none;color:#fff;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:8px;letter-spacing:.2px}
.lf-submit:hover{opacity:.9;transform:translateY(-1px)}
.lc-divider{text-align:center;margin:20px 0;position:relative;font-size:11px;color:#475569;font-weight:700}
.lc-divider::before,.lc-divider::after{content:'';position:absolute;top:50%;width:38%;height:1px;background:rgba(148,163,184,.15)}
.lc-divider::before{left:0}.lc-divider::after{right:0}
.lc-demos{display:flex;flex-direction:column;gap:8px}
.demo-card{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:11px;background:rgba(255,255,255,.03);border:1px solid rgba(148,163,184,.12);color:#f1f5f9;cursor:pointer;font-family:inherit;transition:all .2s;text-align:left}
.demo-card:hover{background:rgba(47,93,138,.15);border-color:rgba(95,133,162,.3)}
.demo-av{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;flex-shrink:0}
.demo-name{font-size:12px;font-weight:800;color:#f1f5f9}
.demo-role{font-size:10px;color:#64748b;font-weight:600}
.demo-id{margin-left:auto;font-size:10px;font-weight:800;color:#5f85a2;background:rgba(47,93,138,.15);padding:2px 8px;border-radius:20px}
.lc-hint{font-size:11px;color:#475569;margin-top:10px;text-align:center}
.lc-hint code{background:rgba(255,255,255,.06);padding:2px 6px;border-radius:4px;color:#94a3b8}
.lf-err{font-size:12px;font-weight:700;color:#ef4444;min-height:18px;margin-bottom:4px}

/* ── EMPLOYEE APP ── */
.emp-app{display:grid;grid-template-columns:240px 1fr;min-height:100vh;position:relative;z-index:5}
.emp-sidebar{background:rgba(9,15,29,.98);border-right:1px solid rgba(148,163,184,.12);padding:20px 0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sb-top{padding:0 18px 20px;border-bottom:1px solid rgba(148,163,184,.1)}
.sb-brand{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.sb-brand-icon{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#2f5d8a,#5f85a2);display:flex;align-items:center;justify-content:center;font-size:15px}
.sb-brand-name{font-size:13px;font-weight:900;color:#f1f5f9}
.sb-brand-sub{font-size:9px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.sb-nav{padding:14px 10px;display:flex;flex-direction:column;gap:3px;flex:1}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;color:#94a3b8;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;border:none;background:none;font-family:inherit;text-align:left;width:100%}
.sb-item:hover{background:rgba(255,255,255,.05);color:#f1f5f9}
.sb-item.active{background:rgba(47,93,138,.2);color:#d5e2ee;border:1px solid rgba(95,133,162,.2)}
.sb-item-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;background:rgba(255,255,255,.05)}
.sb-item.active .sb-item-icon{background:rgba(47,93,138,.3)}
.sb-divider{height:1px;background:rgba(148,163,184,.1);margin:8px 10px}
.sb-user{padding:14px 18px;border-top:1px solid rgba(148,163,184,.1);display:flex;align-items:center;gap:10px;margin-top:auto}
.sb-av{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#2563eb,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff;flex-shrink:0}
.sb-uname{font-size:12px;font-weight:800;color:#f1f5f9}
.sb-urole{font-size:10px;color:#64748b;font-weight:600}
.sb-logout{margin-left:auto;padding:4px 8px;border-radius:6px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#f87171;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.sb-logout:hover{background:rgba(239,68,68,.2)}

/* ── MAIN CONTENT ── */
.emp-main{padding:28px 32px;overflow-y:auto}
.emp-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.emp-greeting{font-size:22px;font-weight:900;letter-spacing:-.5px;color:#f1f5f9}
.emp-greeting span{background:linear-gradient(135deg,#5f85a2,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.emp-date{font-size:12px;color:#64748b;font-weight:600;margin-top:2px}
.emp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.emp-kpi{background:rgba(14,24,38,.97);border:1px solid rgba(148,163,184,.18);border-radius:16px;padding:16px;animation:cardIn .4s ease}
.emp-kpi-icon{font-size:18px;margin-bottom:8px}
.emp-kpi-val{font-size:24px;font-weight:900;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
.emp-kpi-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#64748b;margin-top:3px}
.emp-row{display:grid;grid-template-columns:1fr 320px;gap:14px;margin-bottom:24px}
.emp-card{background:rgba(14,24,38,.97);border:1px solid rgba(148,163,184,.18);border-radius:18px;padding:20px}
.emp-card-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.8px;color:#cbd5e1;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.emp-card-title::after{content:'';flex:1;height:1px;background:rgba(148,163,184,.18)}

/* attendance */
.att-checkin{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.att-status{display:flex;align-items:center;gap:8px}
.att-dot{width:8px;height:8px;border-radius:50%;background:#10b981;box-shadow:0 0 8px rgba(16,185,129,.6);animation:pulse 2s infinite}
.att-lbl{font-size:13px;font-weight:700;color:#10b981}
.att-btn{padding:8px 16px;border-radius:10px;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;border:none;transition:all .2s}
.att-btn-in{background:linear-gradient(135deg,#059669,#10b981);color:#fff}
.att-btn-out{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#f87171}
.att-calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.att-day{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#64748b;background:rgba(255,255,255,.03)}
.att-day.present{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);color:#34d399}
.att-day.absent{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#f87171}
.att-day.today{background:rgba(47,93,138,.25);border:1px solid rgba(95,133,162,.4);color:#7ea8c4;font-weight:900}
.att-day.future{opacity:.3}
.att-day.header{background:none;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px}

/* projects */
.proj-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid rgba(148,163,184,.08);margin-bottom:8px;transition:background .2s}
.proj-item:hover{background:rgba(255,255,255,.06)}
.proj-name{font-size:12px;font-weight:700;color:#f1f5f9;margin-bottom:2px}
.proj-sub{font-size:10px;color:#64748b}
.proj-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.proj-amt{font-size:13px;font-weight:900;color:#10b981;font-variant-numeric:tabular-nums}
.sbadge{display:inline-flex;padding:3px 8px;border-radius:50px;font-size:9px;font-weight:800}

/* performance ring */
.perf-ring-wrap{display:flex;flex-direction:column;align-items:center;gap:12px}
.perf-ring{position:relative;width:120px;height:120px}
.perf-ring svg{position:absolute;top:0;left:0}
.perf-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.perf-pct{font-size:22px;font-weight:900;color:#f1f5f9}
.perf-lbl{font-size:10px;color:#64748b;font-weight:700}
.perf-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%}
.perf-stat{background:rgba(255,255,255,.03);border:1px solid rgba(148,163,184,.1);border-radius:10px;padding:10px;text-align:center}
.perf-stat-val{font-size:16px;font-weight:900;font-variant-numeric:tabular-nums}
.perf-stat-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#64748b;margin-top:2px}

/* track bar */
.tbar{height:6px;background:rgba(148,163,184,.18);border-radius:50px;overflow:hidden;margin-top:6px}
.tbar-fill{height:100%;border-radius:50px;position:relative;overflow:hidden;transition:width 1s ease}
.tbar-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.28),transparent);animation:shimmer 2.5s linear infinite}

.footer{text-align:center;padding:16px;border-top:1px solid rgba(148,163,184,.1);color:#475569;font-size:11px;margin-top:auto}
</style>
</head>
<body>
<div class="g1"></div><div class="g2"></div>
<div id="root"></div>




<script type="text/babel">
{% raw %}

const DEMO_USERS = {
  '17236': { name: 'Alamin', role: 'SMM Member', team: 'SMM', initials: 'A', grad: 'linear-gradient(135deg,#2563eb,#7c3aed)' },
  '17136': { name: 'Ibrahim', role: 'SMM Member', team: 'SMM', initials: 'I', grad: 'linear-gradient(135deg,#ec4899,#8b5cf6)' },
};

const statusBadge = (s) => {
  const map = {
    Delivered: { bg:'rgba(16,185,129,.12)', border:'rgba(16,185,129,.3)', color:'#34d399', icon:'✅' },
    WIP:       { bg:'rgba(245,158,11,.12)', border:'rgba(245,158,11,.3)', color:'#fbbf24', icon:'⏳' },
    Revision:  { bg:'rgba(99,102,241,.12)', border:'rgba(99,102,241,.3)', color:'#a5b4fc', icon:'🔄' },
    Cancelled: { bg:'rgba(239,68,68,.12)',  border:'rgba(239,68,68,.3)',  color:'#f87171', icon:'❌' },
  };
  const c = map[s] || map.WIP;
  return <span className="sbadge" style={{background:c.bg,border:`1px solid ${c.border}`,color:c.color}}>{c.icon} {s}</span>;
};


const AdminPanel = () => {
    const [members, setMembers] = React.useState([]);
    const [attendance, setAttendance] = React.useState([]);
    const [view, setView] = React.useState('members');
    const [editingMember, setEditingMember] = React.useState(null);
    const [editingAtt, setEditingAtt] = React.useState(null);
    const [attDate, setAttDate] = React.useState(new Date().toLocaleDateString('en-CA'));
    const [calendarCfg, setCalendarCfg] = React.useState({});
    const [leaveRequests, setLeaveRequests] = React.useState([]);
    const [auditLogs, setAuditLogs] = React.useState([]);
    const [corrections, setCorrections] = React.useState([]);
    const [dailyReports, setDailyReports] = React.useState([]);
    const [memberSearch, setMemberSearch] = React.useState('');
    const [teamFilter, setTeamFilter] = React.useState('All');
    const [roleFilter, setRoleFilter] = React.useState('All');
    const [leaveStatus, setLeaveStatus] = React.useState('');
    const [correctionStatus, setCorrectionStatus] = React.useState('');
    const [reportDate, setReportDate] = React.useState(new Date().toLocaleDateString('en-CA'));
    const [announcement, setAnnouncement] = React.useState({target:'all', title:'Announcement', message:''});
    const [msg, setMsg] = React.useState('');
    const year = String(new Date().getFullYear());
    const month = String(new Date().getMonth() + 1);

    const fetchMembers = async () => {
        try {
            const res = await fetch('/api/admin/members');
            setMembers(await res.json());
        } catch(e) { console.error(e); }
    };

    const fetchAttendance = async () => {
        try {
            const res = await fetch(`/api/admin/attendance?date=${attDate}`);
            setAttendance(await res.json());
        } catch(e) { console.error(e); }
    };

    const fetchCalendar = async () => {
        try {
            const res = await fetch('/api/admin/calendar-config');
            setCalendarCfg(await res.json());
        } catch(e) { console.error(e); }
    };

    const fetchLeaveRequests = async () => {
        try {
            const res = await fetch(`/api/admin/leave-requests${leaveStatus ? `?status=${leaveStatus}` : ''}`);
            setLeaveRequests(await res.json());
        } catch(e) { console.error(e); }
    };

    const fetchAuditLogs = async () => {
        try {
            const res = await fetch('/api/admin/audit-logs');
            setAuditLogs(await res.json());
        } catch(e) { console.error(e); }
    };

    const fetchCorrections = async () => {
        try {
            const res = await fetch(`/api/admin/attendance-corrections${correctionStatus ? `?status=${correctionStatus}` : ''}`);
            setCorrections(await res.json());
        } catch(e) { console.error(e); }
    };

    const fetchDailyReports = async () => {
        try {
            const res = await fetch(`/api/admin/daily-reports${reportDate ? `?date=${reportDate}` : ''}`);
            setDailyReports(await res.json());
        } catch(e) { console.error(e); }
    };

    React.useEffect(() => {
        if(view === 'members') fetchMembers();
        if(view === 'attendance') fetchAttendance();
        if(view === 'settings') fetchCalendar();
        if(view === 'leave') fetchLeaveRequests();
        if(view === 'audit') fetchAuditLogs();
        if(view === 'corrections') fetchCorrections();
        if(view === 'reports') fetchDailyReports();
    }, [view, attDate, leaveStatus, correctionStatus, reportDate]);

    const handleUpdateMember = async (m) => {
        setMsg('Saving...');
        try {
            const payload = {...m, target: Number(m.target || 0) || 1100, isAdmin: !!m.isAdmin};
            if(!payload.password) delete payload.password;
            delete payload._isNew;
            const res = await fetch(m._isNew ? '/api/admin/members/add' : '/api/admin/members/update', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify(payload)
            });
            if(res.ok) { setMsg('Saved!'); setEditingMember(null); fetchMembers(); }
            else setMsg('Error saving.');
        } catch(e) { setMsg('Error saving.'); }
    };

    const handleDeleteMember = async (m) => {
        if(!confirm(`Delete ${m.name || m.id}?`)) return;
        setMsg('Deleting...');
        try {
            const res = await fetch('/api/admin/members/delete', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({id:m.id})
            });
            if(res.ok) { setMsg('Deleted!'); setEditingMember(null); fetchMembers(); }
            else setMsg('Delete failed.');
        } catch(e) { setMsg('Delete failed.'); }
    };

    const handleUpdateAtt = async (a) => {
        setMsg('Saving...');
        try {
            const res = await fetch('/api/admin/attendance/update', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify(a)
            });
            if(res.ok) { setMsg('Saved!'); setEditingAtt(null); fetchAttendance(); }
            else setMsg('Error saving.');
        } catch(e) { setMsg('Error saving.'); }
    };

    const handleSaveCalendar = async () => {
        setMsg('Saving calendar...');
        try {
            const res = await fetch('/api/admin/calendar-config', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify(calendarCfg)
            });
            if(res.ok) { setMsg('Calendar saved!'); fetchCalendar(); }
            else setMsg('Calendar save failed.');
        } catch(e) { setMsg('Calendar save failed.'); }
    };

    const handleSendAnnouncement = async () => {
        if(!announcement.message.trim()) { setMsg('Announcement message required.'); return; }
        setMsg('Sending announcement...');
        try {
            const res = await fetch('/api/admin/announcements', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify(announcement)
            });
            if(res.ok) { setMsg('Announcement sent!'); setAnnouncement({...announcement, message:''}); }
            else setMsg('Announcement failed.');
        } catch(e) { setMsg('Announcement failed.'); }
    };

    const updateLeaveStatus = async (req, status) => {
        setMsg(`${status} leave request...`);
        try {
            const res = await fetch('/api/admin/leave-requests/update', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({key:req.key, status})
            });
            if(res.ok) { setMsg(`Leave ${status.toLowerCase()}!`); fetchLeaveRequests(); }
            else setMsg('Leave update failed.');
        } catch(e) { setMsg('Leave update failed.'); }
    };

    const updateCorrectionStatus = async (req, status) => {
        setMsg(`${status} correction...`);
        try {
            const res = await fetch('/api/admin/attendance-corrections/update', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({key:req.key, status})
            });
            if(res.ok) { setMsg(`Correction ${status.toLowerCase()}!`); fetchCorrections(); }
            else setMsg('Correction update failed.');
        } catch(e) { setMsg('Correction update failed.'); }
    };

    const setMonthWorkingDays = (value) => {
        setCalendarCfg({
            ...calendarCfg,
            [year]: {
                ...(calendarCfg[year] || {}),
                [month]: Number(value || 0)
            }
        });
    };

    const resetPassword = (m) => {
        setEditingMember({...m, password:'pass123'});
    };

    const teams = [...new Set(members.map(m => m.team).filter(Boolean))].sort();
    const roles = ['Member', 'Team Leader', 'Manager', 'Admin'];
    const roleOptions = [...new Set([...roles, ...members.map(m => m.role).filter(Boolean)])];
    const filteredMembers = [...members].filter(m => {
        const q = memberSearch.toLowerCase();
        const matchesSearch = !q || [m.id, m.name, m.fullName, m.email, m.phone].some(v => String(v || '').toLowerCase().includes(q));
        const matchesTeam = teamFilter === 'All' || m.team === teamFilter;
        const matchesRole = roleFilter === 'All' || m.role === roleFilter;
        return matchesSearch && matchesTeam && matchesRole;
    }).sort((a,b)=>String(a.name || '').localeCompare(String(b.name || '')));
    const adminCount = members.filter(m => m.isAdmin || String(m.role || '').includes('Leader') || String(m.role || '').includes('Manager')).length;
    const presentCount = attendance.filter(a => ['Present', 'Late'].includes(a.status)).length;
    const lateCount = attendance.filter(a => a.status === 'Late').length;

    const fieldStyle = {width:'100%', padding:8, borderRadius:6, background:'rgba(0,0,0,.2)', border:'1px solid rgba(255,255,255,.1)', color:'#fff'};
    const tabStyle = {padding:'7px 12px', fontSize:11};
    const statusColor = (s) => s === 'Late' ? '#ef4444' : s === 'Absent' ? '#f87171' : '#10b981';

    return (
        <div className="emp-card" style={{gridColumn:'1/-1'}}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', gap:16, flexWrap:'wrap', marginBottom:20}}>
                <div className="emp-card-title" style={{margin:0}}>🛡️ Admin Control Panel</div>
                <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
                    <button className={`nav-btn ${view==='members'?'active':''}`} onClick={()=>setView('members')} style={tabStyle}>👥 Members</button>
                    <button className={`nav-btn ${view==='attendance'?'active':''}`} onClick={()=>setView('attendance')} style={tabStyle}>📅 Attendance</button>
                    <button className={`nav-btn ${view==='leave'?'active':''}`} onClick={()=>setView('leave')} style={tabStyle}>🌴 Leave</button>
                    <button className={`nav-btn ${view==='corrections'?'active':''}`} onClick={()=>setView('corrections')} style={tabStyle}>🕒 Corrections</button>
                    <button className={`nav-btn ${view==='reports'?'active':''}`} onClick={()=>setView('reports')} style={tabStyle}>📝 Reports</button>
                    <button className={`nav-btn ${view==='announce'?'active':''}`} onClick={()=>setView('announce')} style={tabStyle}>🔔 Notice</button>
                    <button className={`nav-btn ${view==='settings'?'active':''}`} onClick={()=>setView('settings')} style={tabStyle}>⚙️ Settings</button>
                    <button className={`nav-btn ${view==='audit'?'active':''}`} onClick={()=>setView('audit')} style={tabStyle}>🧾 Audit</button>
                </div>
            </div>
            
            {msg && <div style={{padding:10, background:'rgba(16,185,129,.1)', color:'#10b981', borderRadius:8, marginBottom:16, fontSize:12, fontWeight:700}}>{msg}</div>}

            <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))', gap:12, marginBottom:18}}>
                <div style={{background:'rgba(255,255,255,.03)', border:'1px solid rgba(148,163,184,.12)', borderRadius:10, padding:12}}><div style={{fontSize:10,color:'#64748b',fontWeight:800}}>Members</div><div style={{fontSize:22,fontWeight:900}}>{members.length}</div></div>
                <div style={{background:'rgba(255,255,255,.03)', border:'1px solid rgba(148,163,184,.12)', borderRadius:10, padding:12}}><div style={{fontSize:10,color:'#64748b',fontWeight:800}}>Admins/Leads</div><div style={{fontSize:22,fontWeight:900,color:'#a5b4fc'}}>{adminCount}</div></div>
                <div style={{background:'rgba(255,255,255,.03)', border:'1px solid rgba(148,163,184,.12)', borderRadius:10, padding:12}}><div style={{fontSize:10,color:'#64748b',fontWeight:800}}>Present</div><div style={{fontSize:22,fontWeight:900,color:'#10b981'}}>{presentCount}</div></div>
                <div style={{background:'rgba(255,255,255,.03)', border:'1px solid rgba(148,163,184,.12)', borderRadius:10, padding:12}}><div style={{fontSize:10,color:'#64748b',fontWeight:800}}>Late</div><div style={{fontSize:22,fontWeight:900,color:'#ef4444'}}>{lateCount}</div></div>
            </div>

            {view === 'members' && (
                <div>
                    <div style={{display:'grid', gridTemplateColumns:'minmax(180px,1fr) 170px 170px auto', gap:10, marginBottom:12, alignItems:'center'}}>
                        <input value={memberSearch} onChange={e=>setMemberSearch(e.target.value)} placeholder="Search name, ID, email, phone" style={fieldStyle}/>
                        <select value={teamFilter} onChange={e=>setTeamFilter(e.target.value)} style={fieldStyle}><option>All</option>{teams.map(t=><option key={t}>{t}</option>)}</select>
                        <select value={roleFilter} onChange={e=>setRoleFilter(e.target.value)} style={fieldStyle}><option>All</option>{roleOptions.map(r=><option key={r}>{r}</option>)}</select>
                        <button onClick={()=>setEditingMember({_isNew:true, id:'', name:'', role:'Member', team:teams[0] || '', target:1100, password:'pass123', isAdmin:false})} style={{background:'#10b981', color:'#fff', border:'none', padding:'8px 12px', borderRadius:6, cursor:'pointer', fontWeight:800, fontSize:12}}>Add Member</button>
                    </div>
                    <div style={{overflowX:'auto'}}>
                    <table style={{width:'100%', borderCollapse:'collapse', fontSize:12, textAlign:'left'}}>
                        <thead>
                            <tr style={{borderBottom:'1px solid rgba(148,163,184,.2)', color:'#94a3b8'}}>
                                <th style={{padding:10}}>ID</th>
                                <th style={{padding:10}}>Name</th>
                                <th style={{padding:10}}>Team</th>
                                <th style={{padding:10}}>Role</th>
                                <th style={{padding:10}}>Target</th>
                                <th style={{padding:10}}>Admin</th>
                                <th style={{padding:10}}>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            {filteredMembers.map(m => (
                                <tr key={m.id} style={{borderBottom:'1px solid rgba(148,163,184,.1)'}}>
                                    <td style={{padding:10}}>{m.id}</td>
                                    <td style={{padding:10}}><b>{m.name}</b><div style={{color:'#64748b', fontSize:10}}>{m.email || m.phone || ''}</div></td>
                                    <td style={{padding:10}}>{m.team}</td>
                                    <td style={{padding:10}}>{m.role}</td>
                                    <td style={{padding:10}}>${m.target || 1100}</td>
                                    <td style={{padding:10}}>{m.isAdmin ? 'Yes' : '-'}</td>
                                    <td style={{padding:10}}>
                                        <div style={{display:'flex', gap:6}}>
                                            <button onClick={()=>setEditingMember({...m})} style={{background:'rgba(255,255,255,.1)', border:'none', color:'#f1f5f9', padding:'4px 8px', borderRadius:6, cursor:'pointer', fontSize:11}}>Edit</button>
                                            <button onClick={()=>resetPassword(m)} style={{background:'rgba(59,130,246,.14)', border:'none', color:'#93c5fd', padding:'4px 8px', borderRadius:6, cursor:'pointer', fontSize:11}}>Reset</button>
                                        </div>
                                    </td>
                                </tr>
                            ))}
                            {filteredMembers.length === 0 && <tr><td colSpan="7" style={{padding:20, textAlign:'center', color:'#64748b'}}>No members matched.</td></tr>}
                        </tbody>
                    </table>
                    </div>
                </div>
            )}

            {view === 'corrections' && (
                <div>
                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', gap:12, marginBottom:12, flexWrap:'wrap'}}>
                        <div style={{fontSize:12, color:'#94a3b8', fontWeight:700}}>Review attendance correction requests</div>
                        <select value={correctionStatus} onChange={e=>setCorrectionStatus(e.target.value)} style={{...fieldStyle, width:170}}><option value="">All</option><option>Pending</option><option>Approved</option><option>Rejected</option></select>
                    </div>
                    <div style={{overflowX:'auto'}}>
                        <table style={{width:'100%', borderCollapse:'collapse', fontSize:12, textAlign:'left'}}>
                            <thead><tr style={{borderBottom:'1px solid rgba(148,163,184,.2)', color:'#94a3b8'}}><th style={{padding:10}}>Employee</th><th style={{padding:10}}>Date</th><th style={{padding:10}}>In/Out</th><th style={{padding:10}}>Reason</th><th style={{padding:10}}>Status</th><th style={{padding:10}}>Action</th></tr></thead>
                            <tbody>
                                {corrections.map(r => (
                                    <tr key={r.key} style={{borderBottom:'1px solid rgba(148,163,184,.1)'}}>
                                        <td style={{padding:10}}><b>{r.name || r.emp_id}</b><div style={{color:'#64748b', fontSize:10}}>{r.emp_id}</div></td>
                                        <td style={{padding:10}}>{r.date}</td>
                                        <td style={{padding:10}}>{r.in || '-'} / {r.out || '-'}</td>
                                        <td style={{padding:10, maxWidth:260}}>{r.reason || '-'}</td>
                                        <td style={{padding:10, color:statusColor(r.status)}}>{r.status}</td>
                                        <td style={{padding:10}}><div style={{display:'flex', gap:6}}><button onClick={()=>updateCorrectionStatus(r,'Approved')} style={{background:'#10b981', color:'#fff', border:'none', padding:'4px 8px', borderRadius:6, cursor:'pointer', fontSize:11}}>Approve</button><button onClick={()=>updateCorrectionStatus(r,'Rejected')} style={{background:'#ef4444', color:'#fff', border:'none', padding:'4px 8px', borderRadius:6, cursor:'pointer', fontSize:11}}>Reject</button></div></td>
                                    </tr>
                                ))}
                                {corrections.length === 0 && <tr><td colSpan="6" style={{padding:20, textAlign:'center', color:'#64748b'}}>No correction requests found.</td></tr>}
                            </tbody>
                        </table>
                    </div>
                </div>
            )}

            {view === 'reports' && (
                <div>
                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', gap:12, marginBottom:12, flexWrap:'wrap'}}>
                        <div style={{fontSize:12, color:'#94a3b8', fontWeight:700}}>Daily work reports</div>
                        <input type="date" value={reportDate} onChange={e=>setReportDate(e.target.value)} style={{...fieldStyle, width:170}}/>
                    </div>
                    <div style={{display:'grid', gap:10}}>
                        {dailyReports.map(r => (
                            <div key={r.key} style={{background:'rgba(255,255,255,.03)', border:'1px solid rgba(148,163,184,.1)', borderRadius:10, padding:14}}>
                                <div style={{display:'flex', justifyContent:'space-between', gap:12, marginBottom:8}}><b>{r.name || r.emp_id}</b><span style={{fontSize:11, color:'#94a3b8'}}>{r.date} · {r.hours || 0}h</span></div>
                                <div style={{fontSize:12, color:'#cbd5e1', lineHeight:1.6}}>{r.summary || '-'}</div>
                                {r.blockers && <div style={{fontSize:11, color:'#f59e0b', marginTop:8}}>Blockers: {r.blockers}</div>}
                            </div>
                        ))}
                        {dailyReports.length === 0 && <div style={{padding:20, textAlign:'center', color:'#64748b'}}>No reports found for this date.</div>}
                    </div>
                </div>
            )}

            {view === 'leave' && (
                <div>
                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', gap:12, marginBottom:12, flexWrap:'wrap'}}>
                        <div style={{fontSize:12, color:'#94a3b8', fontWeight:700}}>Review employee leave requests</div>
                        <select value={leaveStatus} onChange={e=>setLeaveStatus(e.target.value)} style={{...fieldStyle, width:170}}><option value="">All</option><option>Pending</option><option>Approved</option><option>Rejected</option></select>
                    </div>
                    <div style={{overflowX:'auto'}}>
                        <table style={{width:'100%', borderCollapse:'collapse', fontSize:12, textAlign:'left'}}>
                            <thead><tr style={{borderBottom:'1px solid rgba(148,163,184,.2)', color:'#94a3b8'}}><th style={{padding:10}}>Employee</th><th style={{padding:10}}>Type</th><th style={{padding:10}}>Dates</th><th style={{padding:10}}>Reason</th><th style={{padding:10}}>Status</th><th style={{padding:10}}>Action</th></tr></thead>
                            <tbody>
                                {leaveRequests.map(r => (
                                    <tr key={r.key} style={{borderBottom:'1px solid rgba(148,163,184,.1)'}}>
                                        <td style={{padding:10}}><b>{r.name || r.emp_id}</b><div style={{color:'#64748b', fontSize:10}}>{r.emp_id}</div></td>
                                        <td style={{padding:10}}>{r.type}</td>
                                        <td style={{padding:10}}>{r.from} → {r.to}</td>
                                        <td style={{padding:10, maxWidth:260}}>{r.reason || '-'}</td>
                                        <td style={{padding:10, color:statusColor(r.status)}}>{r.status}</td>
                                        <td style={{padding:10}}><div style={{display:'flex', gap:6}}><button onClick={()=>updateLeaveStatus(r,'Approved')} style={{background:'#10b981', color:'#fff', border:'none', padding:'4px 8px', borderRadius:6, cursor:'pointer', fontSize:11}}>Approve</button><button onClick={()=>updateLeaveStatus(r,'Rejected')} style={{background:'#ef4444', color:'#fff', border:'none', padding:'4px 8px', borderRadius:6, cursor:'pointer', fontSize:11}}>Reject</button></div></td>
                                    </tr>
                                ))}
                                {leaveRequests.length === 0 && <tr><td colSpan="6" style={{padding:20, textAlign:'center', color:'#64748b'}}>No leave requests found.</td></tr>}
                            </tbody>
                        </table>
                    </div>
                </div>
            )}

            {view === 'announce' && (
                <div style={{display:'grid', gridTemplateColumns:'minmax(260px,520px) 1fr', gap:14}}>
                    <div style={{background:'rgba(255,255,255,.03)', border:'1px solid rgba(148,163,184,.12)', borderRadius:10, padding:16}}>
                        <div className="emp-card-title" style={{fontSize:14}}>Send Announcement</div>
                        <div style={{display:'grid', gap:10}}>
                            <input value={announcement.title} onChange={e=>setAnnouncement({...announcement, title:e.target.value})} placeholder="Title" style={fieldStyle}/>
                            <select value={announcement.target} onChange={e=>setAnnouncement({...announcement, target:e.target.value})} style={fieldStyle}><option value="all">All employees</option>{teams.map(t=><option key={t} value={t}>Team: {t}</option>)}{members.map(m=><option key={m.id} value={m.id}>{m.name} ({m.id})</option>)}</select>
                            <textarea value={announcement.message} onChange={e=>setAnnouncement({...announcement, message:e.target.value})} placeholder="Write notice..." rows="5" style={{...fieldStyle, resize:'vertical'}}></textarea>
                            <button onClick={handleSendAnnouncement} style={{background:'#2563eb', color:'#fff', border:'none', padding:'9px 12px', borderRadius:6, cursor:'pointer', fontWeight:800}}>Send Notice</button>
                        </div>
                    </div>
                    <div style={{background:'rgba(255,255,255,.03)', border:'1px solid rgba(148,163,184,.12)', borderRadius:10, padding:16, fontSize:12, color:'#94a3b8', lineHeight:1.7}}>Notice bell-এ message দেখাবে. Target হিসেবে all, team, অথবা exact employee ID ব্যবহার করা যাবে। Team select করলে backend ওই team-এর সব member-কে notification পাঠাবে।</div>
                </div>
            )}

            {view === 'attendance' && (
                <div>
                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', gap:12, marginBottom:12, flexWrap:'wrap'}}>
                        <div style={{fontSize:12, color:'#94a3b8', fontWeight:700}}>Date wise attendance control</div>
                        <input type="date" value={attDate} onChange={e=>setAttDate(e.target.value)} style={{...fieldStyle, width:170}}/>
                    </div>
                    <div style={{overflowX:'auto'}}>
                    <table style={{width:'100%', borderCollapse:'collapse', fontSize:12, textAlign:'left'}}>
                        <thead>
                            <tr style={{borderBottom:'1px solid rgba(148,163,184,.2)', color:'#94a3b8'}}>
                                <th style={{padding:10}}>Emp ID</th>
                                <th style={{padding:10}}>Date</th>
                                <th style={{padding:10}}>In Time</th>
                                <th style={{padding:10}}>Out Time</th>
                                <th style={{padding:10}}>Status</th>
                                <th style={{padding:10}}>Duration</th>
                                <th style={{padding:10}}>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            {attendance.map(a => (
                                <tr key={a.emp_id+a.date} style={{borderBottom:'1px solid rgba(148,163,184,.1)'}}>
                                    <td style={{padding:10}}>{a.emp_id}</td>
                                    <td style={{padding:10}}>{a.date}</td>
                                    <td style={{padding:10, color:'#10b981', fontWeight:800}}>{a.in || '-'}</td>
                                    <td style={{padding:10, color:'#f59e0b', fontWeight:800}}>{a.out || '-'}</td>
                                    <td style={{padding:10}}>
                                        <span style={{padding:'2px 8px', borderRadius:10, fontSize:10, background:'rgba(255,255,255,.06)', color:statusColor(a.status)}}>{a.status}</span>
                                    </td>
                                    <td style={{padding:10}}>{a.duration || '-'}</td>
                                    <td style={{padding:10}}>
                                        <button onClick={()=>setEditingAtt({...a})} style={{background:'rgba(255,255,255,.1)', border:'none', color:'#f1f5f9', padding:'4px 8px', borderRadius:6, cursor:'pointer', fontSize:11}}>Fix Time</button>
                                    </td>
                                </tr>
                            ))}
                            {attendance.length === 0 && <tr><td colSpan="7" style={{padding:20, textAlign:'center', color:'#64748b'}}>No attendance records for today.</td></tr>}
                        </tbody>
                    </table>
                    </div>
                </div>
            )}

            {view === 'settings' && (
                <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(260px,1fr))', gap:14}}>
                    <div style={{background:'rgba(255,255,255,.03)', border:'1px solid rgba(148,163,184,.12)', borderRadius:10, padding:16}}>
                        <div className="emp-card-title" style={{fontSize:14}}>Working Days</div>
                        <div style={{fontSize:11, color:'#64748b', marginBottom:12}}>Current month override for attendance and progress calculation.</div>
                        <label style={{fontSize:11, color:'#94a3b8'}}>April 2026 working days</label>
                        <input type="number" value={(calendarCfg[year] && calendarCfg[year][month]) || ''} onChange={e=>setMonthWorkingDays(e.target.value)} placeholder="e.g. 22" style={{...fieldStyle, marginTop:6}}/>
                        <button onClick={handleSaveCalendar} style={{marginTop:12, background:'#2563eb', color:'#fff', border:'none', padding:'9px 12px', borderRadius:6, cursor:'pointer', fontWeight:800}}>Save Calendar</button>
                    </div>
                    <div style={{background:'rgba(255,255,255,.03)', border:'1px solid rgba(148,163,184,.12)', borderRadius:10, padding:16}}>
                        <div className="emp-card-title" style={{fontSize:14}}>Admin Access</div>
                        <div style={{fontSize:11, color:'#64748b', lineHeight:1.7}}>Member edit modal থেকে role, admin access, target, contact info, and password reset করা যাবে. Team Leader and Manager role login করলেও Admin panel পাবে.</div>
                    </div>
                </div>
            )}

            {view === 'audit' && (
                <div style={{overflowX:'auto'}}>
                    <table style={{width:'100%', borderCollapse:'collapse', fontSize:12, textAlign:'left'}}>
                        <thead><tr style={{borderBottom:'1px solid rgba(148,163,184,.2)', color:'#94a3b8'}}><th style={{padding:10}}>Time</th><th style={{padding:10}}>Action</th><th style={{padding:10}}>Detail</th><th style={{padding:10}}>Actor</th></tr></thead>
                        <tbody>
                            {auditLogs.map((l,i) => <tr key={i} style={{borderBottom:'1px solid rgba(148,163,184,.1)'}}><td style={{padding:10}}>{new Date((l.timestamp || 0) * 1000).toLocaleString()}</td><td style={{padding:10, color:'#a5b4fc', fontWeight:800}}>{l.action}</td><td style={{padding:10}}>{l.detail}</td><td style={{padding:10}}>{l.actor || 'admin'}</td></tr>)}
                            {auditLogs.length === 0 && <tr><td colSpan="4" style={{padding:20, textAlign:'center', color:'#64748b'}}>No audit logs yet.</td></tr>}
                        </tbody>
                    </table>
                </div>
            )}

            {/* Edit Member Modal */}
            {editingMember && (
                <div style={{position:'fixed', inset:0, background:'rgba(0,0,0,.8)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:100}}>
                    <div style={{background:'#0f172a', padding:24, borderRadius:16, width:'min(560px, 92vw)', maxHeight:'86vh', overflowY:'auto', border:'1px solid rgba(148,163,184,.2)'}}>
                        <h3 style={{marginTop:0, marginBottom:16}}>{editingMember._isNew ? 'Add Member' : 'Edit Member'}</h3>
                        <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))', gap:10}}>
                            <div><label style={{fontSize:11, color:'#94a3b8'}}>Employee ID</label><input value={editingMember.id || ''} disabled={!editingMember._isNew} onChange={e=>setEditingMember({...editingMember, id:e.target.value})} style={{...fieldStyle, opacity:editingMember._isNew?1:.65}}/></div>
                            <div><label style={{fontSize:11, color:'#94a3b8'}}>Name</label><input value={editingMember.name || ''} onChange={e=>setEditingMember({...editingMember, name:e.target.value})} style={fieldStyle}/></div>
                            <div><label style={{fontSize:11, color:'#94a3b8'}}>Full Name</label><input value={editingMember.fullName || ''} onChange={e=>setEditingMember({...editingMember, fullName:e.target.value})} style={fieldStyle}/></div>
                            <div><label style={{fontSize:11, color:'#94a3b8'}}>Role</label><select value={editingMember.role || 'Member'} onChange={e=>setEditingMember({...editingMember, role:e.target.value})} style={fieldStyle}>{roles.map(r=><option key={r}>{r}</option>)}</select></div>
                            <div><label style={{fontSize:11, color:'#94a3b8'}}>Team</label><input list="adminTeams" value={editingMember.team || ''} onChange={e=>setEditingMember({...editingMember, team:e.target.value})} style={fieldStyle}/><datalist id="adminTeams">{teams.map(t=><option key={t} value={t}/>)}</datalist></div>
                            <div><label style={{fontSize:11, color:'#94a3b8'}}>Target ($)</label><input type="number" value={editingMember.target || ''} onChange={e=>setEditingMember({...editingMember, target:e.target.value})} style={fieldStyle}/></div>

                            </label>

            {/* Edit Attendance Modal */}
            {editingAtt && (

                    <div style={{background:'#0f172a', padding:24, borderRadius:16, width:300, border:'1px solid rgba(148,163,184,.2)'}}>
                        <h3 style={{marginTop:0, marginBottom:16}}>Override Time</h3>
                        <div style={{display:'flex', flexDirection:'column', gap:10}}>

                            <div><label style={{fontSize:11, color:'#94a3b8'}}>Out Time (e.g. 06:00 PM)</label><input value={editingAtt.out || ''} onChange={e=>setEditingAtt({...editingAtt, out:e.target.value})} style={fieldStyle}/></div>
                            <div><label style={{fontSize:11, color:'#94a3b8'}}>Status</label><select value={editingAtt.status || 'Present'} onChange={e=>setEditingAtt({...editingAtt, status:e.target.value})} style={fieldStyle}><option>Present</option><option>Late</option><option>Absent</option><option>Leave</option></select></div>
                            <div><label style={{fontSize:11, color:'#94a3b8'}}>Duration (e.g. 8h 30m)</label><input value={editingAtt.duration || ''} onChange={e=>setEditingAtt({...editingAtt, duration:e.target.value})} style={fieldStyle}/></div>
                        </div>
                        <div style={{display:'flex', gap:8, marginTop:20}}>
                            <button onClick={()=>handleUpdateAtt(editingAtt)} style={{flex:1, background:'#2563eb', color:'#fff', border:'none', padding:'8px', borderRadius:6, cursor:'pointer'}}>Save</button>
                            <button onClick={()=>setEditingAtt(null)} style={{flex:1, background:'rgba(255,255,255,.1)', color:'#fff', border:'none', padding:'8px', borderRadius:6, cursor:'pointer'}}>Cancel</button>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
};

const App = () => {
  const [screen, setScreen] = React.useState('login'); 
  const [user, setUser] = React.useState(null);
  const [empId, setEmpId] = React.useState('');
  const [pass, setPass] = React.useState('');
  const [err, setErr] = React.useState('');
  const [navItem, setNavItem] = React.useState('overview');
  const [checkedIn, setCheckedIn] = React.useState(false);
  const [checkInTime, setCheckInTime] = React.useState('');
  const [attData, setAttData] = React.useState([]);
  const [notifications, setNotifications] = React.useState([]);
  const [showNotifs, setShowNotifs] = React.useState(false);
  const [updMsg, setUpdMsg] = React.useState('');
  const [projFilter, setProjFilter] = React.useState('All');
  const [myLeaveRequests, setMyLeaveRequests] = React.useState([]);
  const [leaveMsg, setLeaveMsg] = React.useState('');
  const [leaveForm, setLeaveForm] = React.useState({type:'Annual', from:'', to:'', reason:''});
  const [myCorrections, setMyCorrections] = React.useState([]);
  const [correctionMsg, setCorrectionMsg] = React.useState('');
  const [correctionForm, setCorrectionForm] = React.useState({date:new Date().toLocaleDateString('en-CA'), in:'', out:'', reason:''});
  const [myReports, setMyReports] = React.useState([]);
  const [reportMsg, setReportMsg] = React.useState('');
  const [reportForm, setReportForm] = React.useState({date:new Date().toLocaleDateString('en-CA'), hours:'8', summary:'', blockers:''});
  const [teamBoard, setTeamBoard] = React.useState({team:'', members:[]});
  const [passwordForm, setPasswordForm] = React.useState({password:'', confirm:''});

  const doLogin = async (id) => {
    const uid = id || empId.trim().toUpperCase();
    const pwd = pass || 'pass123';
    setErr('');
    try {
        const res = await fetch('/api/login', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: uid, password: pwd })
        });
        const data = await res.json();
        if(data.status === 'ok') {
            const [attRes, notifRes] = await Promise.all([
                fetch(`/api/attendance?id=${uid}`),
                fetch(`/api/notifications?id=${uid}`)
            ]);
            const [attList, notifList] = await Promise.all([attRes.json(), notifRes.json()]);
            
            setAttData(attList);
            setNotifications(notifList);

            const todayStr = new Date().toLocaleDateString('en-CA');
            const todayRec = attList.find(r => r.date === todayStr);
            if (todayRec && todayRec.in && !todayRec.out) {
                setCheckedIn(true);
                setCheckInTime(todayRec.in);
            } else {
                setCheckedIn(false);
            }
            
            const projects = data.user.projects || [];
            setUser({
                id: data.user.profile.id,
                name: data.user.profile.name || 'Employee',
                fullName: data.user.profile.fullName || data.user.profile.name,
                role: data.user.profile.role,
                team: data.user.profile.department,
                email: data.user.profile.email || '',
                phone: data.user.profile.phone || '',
                initials: data.user.profile.avatar || 'U',
                grad: data.user.profile.avatarColor || 'linear-gradient(135deg,#2563eb,#7c3aed)',
                deliveredAmt: data.user.stats.deliveredAmt || 0,
                wipAmt: data.user.stats.wipAmt || 0,
                delivered: projects.filter(p => p.status === 'Delivered').length,
                wip: projects.filter(p => p.status === 'WIP').length,
                cancelled: projects.filter(p => ['Cancelled', 'Hold'].includes(p.status)).length,
                target: data.user.profile.target || 1100,
                projects: projects,
                leave: data.user.stats.leaveBalance || {},
                rating: (data.user.performance && data.user.performance[0]) ? data.user.performance[0].value : 4.8,
                isAdmin: data.user.profile.isAdmin || false
            });
            setScreen('dashboard');
        } else {
            setErr('Invalid ID or password.');
        }
    } catch(e) {
        setErr('Server error connecting to database.');
    }
  };

  const toggleCheckIn = async () => {
    if(!user) return;
    const now = new Date();
    const timeStr = now.toLocaleTimeString('en-US', {hour: '2-digit', minute:'2-digit', hour12: true});
    const action = checkedIn ? 'check-out' : 'check-in';
    
    try {
        const res = await fetch('/api/attendance', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                emp_id: user.id, 
                date: now.toLocaleDateString('en-CA'), 
                [action === 'check-in' ? 'in' : 'out']: timeStr,
                status: 'Present' 
            })
        });
        if(res.ok) {
            setCheckedIn(!checkedIn);
            if(action === 'check-in') setCheckInTime(timeStr);
            const attRes = await fetch(`/api/attendance?id=${user.id}`);
            const attList = await attRes.json();
            setAttData(attList);
        }
    } catch(e) {
        console.error("Checkin failed", e);
    }
  };

  const handleUpdateProfile = async (e) => {
    e.preventDefault();
    setUpdMsg('Updating...');
    try {
        const res = await fetch('/api/user/update', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                id: user.id,
                fullName: user.fullName,
                email: user.email,
                phone: user.phone
            })
        });
        if(res.ok) setUpdMsg('Profile updated successfully!');
        else setUpdMsg('Failed to update profile.');
    } catch(e) { setUpdMsg('Error updating profile.'); }

    } catch(e) { console.error(e); }
  };

        setMyCorrections(await res.json());
    } catch(e) { console.error(e); }

        if(res.ok) {
            setLeaveMsg('Leave request submitted!');
            setLeaveForm({type:'Annual', from:'', to:'', reason:''});
            fetchMyLeaveRequests();
        } else setLeaveMsg('Leave request failed.');
    } catch(e) { setLeaveMsg('Leave request failed.'); }
  };

  const submitCorrectionRequest = async (e) => {
    e.preventDefault();
    setCorrectionMsg('Submitting...');
    try {
        const res = await fetch('/api/attendance-corrections', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({...correctionForm, emp_id:user.id, name:user.name})
        });
        if(res.ok) {
            setCorrectionMsg('Correction request submitted!');
            setCorrectionForm({date:new Date().toLocaleDateString('en-CA'), in:'', out:'', reason:''});
            fetchMyCorrections();
        } else setCorrectionMsg('Correction request failed.');
    } catch(e) { setCorrectionMsg('Correction request failed.'); }
  };

  const submitDailyReport = async (e) => {
    e.preventDefault();
    setReportMsg('Submitting...');
    try {
        const res = await fetch('/api/daily-reports', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({...reportForm, emp_id:user.id, name:user.name})
        });
        if(res.ok) {
            setReportMsg('Daily report saved!');
            setReportForm({...reportForm, summary:'', blockers:''});
            fetchMyReports();
        } else setReportMsg('Daily report failed.');
    } catch(e) { setReportMsg('Daily report failed.'); }
  };

  const changePassword = async (e) => {
    e.preventDefault();
    if(!passwordForm.password || passwordForm.password !== passwordForm.confirm) {
        setUpdMsg('Passwords do not match.');
        return;
    }
    setUpdMsg('Updating password...');
    try {
        const res = await fetch('/api/user/update', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({id:user.id, password:passwordForm.password})
        });
        if(res.ok) { setUpdMsg('Password updated successfully!'); setPasswordForm({password:'', confirm:''}); }
        else setUpdMsg('Password update failed.');
    } catch(e) { setUpdMsg('Password update failed.'); }
  };

  const markRead = async () => {
    setShowNotifs(!showNotifs);
    if(!showNotifs && notifications.some(n => !n.read)) {
        await fetch('/api/notifications/mark-read', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: user.id })
        });
        setNotifications(notifications.map(n => ({...n, read: true})));
    }
  };

  const attStats = {
    present: attData.filter(a => a.status === 'Present' || a.status === 'Late').length,
    absent: attData.filter(a => a.status === 'Absent').length,
    late: attData.filter(a => a.status === 'Late').length
  };

  const pct = user ? Math.min(100, Math.round((user.deliveredAmt / user.target) * 100)) : 0;
  const da = 263.9, ds = da - (da * pct / 100);

  const NAV = [
    { id:'overview', icon:'📊', label:'Overview' },
    { id:'attendance', icon:'📅', label:'Attendance' },
    { id:'projects', icon:'📁', label:'My Projects' },
    { id:'performance', icon:'🏆', label:'Performance' },
    { id:'reports', icon:'📝', label:'Daily Report' },
    { id:'team', icon:'👥', label:'My Team' },
    { id:'leave', icon:'🌴', label:'Leave Balance' },
    { id:'settings', icon:'⚙️', label:'Settings' },
    ...(user?.isAdmin ? [{ id:'admin', icon:'🛡️', label:'Admin Control' }] : []),
  ];
  
  const DAYS = ['S','M','T','W','T','F','S'];
  
  const renderCalendar = () => {
      const now = new Date();
      const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
      const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
      let boxes = [];
      for(let i=0; i<monthStart.getDay(); i++) boxes.push('f');
      for(let d=1; d<=daysInMonth; d++) {
          const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const rec = attData.find(r => r.date === dateStr);
          if (rec) {
              if (rec.status === 'Absent') boxes.push(0);
              else if (rec.status === 'Present' || rec.status === 'Late') boxes.push(1);
          } else {
              if (d === now.getDate()) boxes.push('t');
              else if (d > now.getDate()) boxes.push('future');
              else boxes.push(0); 
          }
      }
      return boxes;
  };

          <p className="lc-hint">Password for both: <code>pass123</code></p>

          ))}

          <button className="sb-item" onClick={()=>window.history.back()}>

        <div className="sb-user">

                    🔔 {unreadCount > 0 && <span style={{position:'absolute',top:-4,right:-4,background:'#ef4444',color:'#fff',fontSize:10,padding:'2px 5px',borderRadius:20}}>{unreadCount}</span>}
                </button>

                        <div style={{fontSize:12,fontWeight:800,marginBottom:12,paddingBottom:8,borderBottom:'1px solid rgba(148,163,184,.1)'}}>Notifications</div>
                        <div style={{maxHeight:300,overflowY:'auto'}}>
                            {notifications.length === 0 ? <p style={{fontSize:11,color:'#64748b',textAlign:'center'}}>No notifications</p> : 
                             notifications.map((n,i) => (
                                <div key={i} style={{padding:'8px 0',borderBottom:i<notifications.length-1?'1px solid rgba(148,163,184,.05)':''}}>
                                    <div style={{fontSize:11,fontWeight:800,color:n.read?'#94a3b8':'#f1f5f9'}}>{n.title}</div>

                  <circle cx="50" cy="50" r="42" stroke={pct>=80?'#10b981':pct>=50?'#f59e0b':'#ef4444'} strokeWidth="8" fill="none"
                    strokeDasharray={da} strokeDashoffset={ds} strokeLinecap="round"
                    style={{transform:'rotate(-90deg)',transformOrigin:'center',transition:'stroke-dashoffset 1.8s ease'}}/>
                </svg>
                <div className="perf-inner">
                  <div className="perf-pct">{pct}%</div>
                  <div className="perf-lbl">Target</div>
                </div>
              </div>
            </div>
            <div className="perf-stats">
              <div className="perf-stat"><div className="perf-stat-val" style={{color:'#10b981'}}>{user.delivered}</div><div className="perf-stat-lbl">Delivered</div></div>
              <div className="perf-stat"><div className="perf-stat-val" style={{color:'#f59e0b'}}>{user.wip}</div><div className="perf-stat-lbl">WIP</div></div>
              <div className="perf-stat"><div className="perf-stat-val" style={{color:'#ef4444'}}>{user.cancelled}</div><div className="perf-stat-lbl">Cancelled</div></div>
              <div className="perf-stat"><div className="perf-stat-val" style={{color:'#a5b4fc'}}>⭐ {user.rating}</div><div className="perf-stat-lbl">Rating</div></div>
            </div>
          </div>
        )}

        { navItem === 'reports' && (
          <div className="emp-card">
            <div className="emp-card-title">📝 Daily Work Report</div>
            <div style={{display:'grid', gridTemplateColumns:'minmax(280px,460px) 1fr', gap:18}}>
              <form onSubmit={submitDailyReport} style={{display:'grid', gap:12}}>
                <div style={{display:'grid', gridTemplateColumns:'1fr 110px', gap:10}}>
                  <input type="date" value={reportForm.date} onChange={e=>setReportForm({...reportForm, date:e.target.value})} style={{padding:10, borderRadius:8, background:'rgba(0,0,0,.2)', border:'1px solid rgba(255,255,255,.1)', color:'#fff'}}/>
                  <input type="number" min="0" step="0.5" value={reportForm.hours} onChange={e=>setReportForm({...reportForm, hours:e.target.value})} style={{padding:10, borderRadius:8, background:'rgba(0,0,0,.2)', border:'1px solid rgba(255,255,255,.1)', color:'#fff'}}/>
                </div>
                <textarea required value={reportForm.summary} onChange={e=>setReportForm({...reportForm, summary:e.target.value})} placeholder="What did you complete today?" rows="6" style={{padding:10, borderRadius:8, background:'rgba(0,0,0,.2)', border:'1px solid rgba(255,255,255,.1)', color:'#fff', resize:'vertical'}}></textarea>
                <textarea value={reportForm.blockers} onChange={e=>setReportForm({...reportForm, blockers:e.target.value})} placeholder="Any blockers or notes?" rows="3" style={{padding:10, borderRadius:8, background:'rgba(0,0,0,.2)', border:'1px solid rgba(255,255,255,.1)', color:'#fff', resize:'vertical'}}></textarea>
                {reportMsg && <div style={{fontSize:11, fontWeight:800, color:reportMsg.includes('saved')?'#10b981':'#ef4444'}}>{reportMsg}</div>}
                <button className="lf-submit" style={{marginTop:0}}>Save Report</button>
              </form>
              <div style={{background:'rgba(255,255,255,.03)', border:'1px solid rgba(148,163,184,.1)', borderRadius:12, padding:16}}>
                <div className="emp-card-title" style={{fontSize:14}}>Recent Reports</div>
                <div style={{display:'grid', gap:10}}>
                  {myReports.map(r => (
                    <div key={r.key} style={{padding:'10px 0', borderBottom:'1px solid rgba(148,163,184,.08)'}}>
                      <div style={{display:'flex', justifyContent:'space-between', gap:10}}><b style={{fontSize:12}}>{r.date}</b><span style={{fontSize:11, color:'#94a3b8'}}>{r.hours || 0}h</span></div>
                      <div style={{fontSize:11, color:'#cbd5e1', marginTop:5, lineHeight:1.5}}>{r.summary}</div>
                      {r.blockers && <div style={{fontSize:10, color:'#f59e0b', marginTop:5}}>Blockers: {r.blockers}</div>}
                    </div>
                  ))}
                  {myReports.length === 0 && <div style={{fontSize:12, color:'#64748b', textAlign:'center', padding:18}}>No reports yet.</div>}
                </div>
              </div>
            </div>
          </div>
        )}

        { navItem === 'team' && (
          <div className="emp-card">
            <div className="emp-card-title">👥 {teamBoard.team || user.team} Team Leaderboard</div>
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%', borderCollapse:'collapse', fontSize:12, textAlign:'left'}}>
                <thead><tr style={{borderBottom:'1px solid rgba(148,163,184,.2)', color:'#94a3b8'}}><th style={{padding:10}}>Rank</th><th style={{padding:10}}>Member</th><th style={{padding:10}}>Delivered</th><th style={{padding:10}}>Target</th><th style={{padding:10}}>Progress</th></tr></thead>
                <tbody>
                  {(teamBoard.members || []).map((m,i) => (
                    <tr key={m.id} style={{borderBottom:'1px solid rgba(148,163,184,.1)', background:m.id===user.id?'rgba(59,130,246,.08)':'transparent'}}>
                      <td style={{padding:10, fontWeight:900, color:i<3?'#f59e0b':'#94a3b8'}}>#{i+1}</td>
                      <td style={{padding:10}}><b>{m.name}</b><div style={{fontSize:10, color:'#64748b'}}>{m.role}</div></td>
                      <td style={{padding:10, color:'#10b981', fontWeight:900}}>${(m.deliveredAmt || 0).toLocaleString()}</td>
                      <td style={{padding:10}}>${(m.target || 0).toLocaleString()}</td>
                      <td style={{padding:10}}><div style={{display:'flex', alignItems:'center', gap:8}}><div style={{height:6, width:120, background:'rgba(255,255,255,.08)', borderRadius:20, overflow:'hidden'}}><div style={{height:'100%', width:`${Math.min(100,m.progress || 0)}%`, background:'#10b981'}}></div></div><b>{m.progress || 0}%</b></div></td>
                    </tr>
                  ))}
                  {(!teamBoard.members || teamBoard.members.length === 0) && <tr><td colSpan="5" style={{padding:20, textAlign:'center', color:'#64748b'}}>No team data found.</td></tr>}
                </tbody>
              </table>
            </div>
          </div>
        )}

        { navItem === 'leave' && (
          <div className="emp-card">
            <div className="emp-card-title">🌴 My Leave Balance</div>
            <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(200px, 1fr))', gap:14}}>
              {Object.entries(user.leave || {}).map(([key, l]) => (
                <div key={key} style={{background:'rgba(255,255,255,.03)', border:'1px solid rgba(148,163,184,.1)', borderRadius:12, padding:14}}>
                  <div style={{fontSize:10, fontWeight:800, color:'#64748b', textTransform:'uppercase', marginBottom:6}}>{l.label || key}</div>
                  <div style={{display:'flex', alignItems:'baseline', gap:6}}>
                    <div style={{fontSize:24, fontWeight:900, color:l.color || '#f1f5f9'}}>{l.remaining}</div>
                    <div style={{fontSize:11, color:'#64748b'}}>days left</div>
                  </div>
                  <div style={{height:4, background:'rgba(148,163,184,.1)', borderRadius:10, marginTop:10, overflow:'hidden'}}>
                    <div style={{height:'100%', width:`${(l.remaining/l.total)*100}%`, background:l.color || '#3b82f6'}}></div>
                  </div>
                  <div style={{fontSize:9, color:'#475569', marginTop:8, fontWeight:700}}>{l.used} used / {l.total} total</div>
                </div>
              ))}
            </div>
            <div style={{display:'grid', gridTemplateColumns:'minmax(260px,420px) 1fr', gap:18, marginTop:22}}>
              <form onSubmit={submitLeaveRequest} style={{background:'rgba(255,255,255,.03)', border:'1px solid rgba(148,163,184,.1)', borderRadius:12, padding:16, display:'grid', gap:10}}>
                <div className="emp-card-title" style={{fontSize:14}}>Apply Leave</div>
                <select value={leaveForm.type} onChange={e=>setLeaveForm({...leaveForm, type:e.target.value})} style={{padding:10, borderRadius:8, background:'rgba(0,0,0,.2)', border:'1px solid rgba(255,255,255,.1)', color:'#fff'}}><option>Annual</option><option>Sick</option><option>Casual</option><option>Emergency</option></select>
                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
                  <input type="date" value={leaveForm.from} required onChange={e=>setLeaveForm({...leaveForm, from:e.target.value})} style={{padding:10, borderRadius:8, background:'rgba(0,0,0,.2)', border:'1px solid rgba(255,255,255,.1)', color:'#fff'}}/>
                  <input type="date" value={leaveForm.to} required onChange={e=>setLeaveForm({...leaveForm, to:e.target.value})} style={{padding:10, borderRadius:8, background:'rgba(0,0,0,.2)', border:'1px solid rgba(255,255,255,.1)', color:'#fff'}}/>
                </div>
                <textarea value={leaveForm.reason} onChange={e=>setLeaveForm({...leaveForm, reason:e.target.value})} placeholder="Reason" rows="3" style={{padding:10, borderRadius:8, background:'rgba(0,0,0,.2)', border:'1px solid rgba(255,255,255,.1)', color:'#fff', resize:'vertical'}}></textarea>
                {leaveMsg && <div style={{fontSize:11, fontWeight:800, color:leaveMsg.includes('submitted')?'#10b981':'#ef4444'}}>{leaveMsg}</div>}
                <button className="lf-submit" style={{marginTop:0}}>Submit Request</button>
              </form>
              <div style={{background:'rgba(255,255,255,.03)', border:'1px solid rgba(148,163,184,.1)', borderRadius:12, padding:16}}>
                <div className="emp-card-title" style={{fontSize:14}}>My Requests</div>
                <div style={{display:'grid', gap:8}}>
                  {myLeaveRequests.map(r => (
                    <div key={r.key} style={{display:'grid', gridTemplateColumns:'1fr auto', gap:10, padding:'10px 0', borderBottom:'1px solid rgba(148,163,184,.08)'}}>
                      <div><div style={{fontSize:12, fontWeight:800}}>{r.type} · {r.from} → {r.to}</div><div style={{fontSize:10, color:'#64748b'}}>{r.reason || 'No reason'}</div></div>
                      <div style={{fontSize:11, fontWeight:900, color:r.status==='Approved'?'#10b981':r.status==='Rejected'?'#ef4444':'#f59e0b'}}>{r.status}</div>
                    </div>
                  ))}
                  {myLeaveRequests.length === 0 && <div style={{fontSize:12, color:'#64748b', textAlign:'center', padding:18}}>No leave requests yet.</div>}
                </div>
              </div>
            </div>
          </div>
        )}

        { navItem === 'settings' && (
            <div className="emp-card">
                <div className="emp-card-title">⚙️ Account Settings</div>
                <form onSubmit={handleUpdateProfile} style={{display:'flex', flexDirection:'column', gap:16, maxWidth:400}}>
                    <div className="lf-group">
                        <label className="lf-label">Full Name</label>
                        <input className="lf-input" style={{paddingLeft:12}} value={user.fullName} onChange={e=>setUser({...user, fullName:e.target.value})}/>
                    </div>
                    <div className="lf-group">
                        <label className="lf-label">Email Address</label>
                        <input className="lf-input" style={{paddingLeft:12}} value={user.email} onChange={e=>setUser({...user, email:e.target.value})}/>
                    </div>
                    <div className="lf-group">
                        <label className="lf-label">Phone Number</label>
                        <input className="lf-input" style={{paddingLeft:12}} value={user.phone} onChange={e=>setUser({...user, phone:e.target.value})}/>
                    </div>
                    {updMsg && <div style={{fontSize:11, fontWeight:800, color:updMsg.includes('success')?'#10b981':'#ef4444'}}>{updMsg}</div>}
                    <button type="submit" className="lf-submit" style={{marginTop:0}}>Update Profile</button>
                </form>
                <div style={{marginTop:32, paddingTop:24, borderTop:'1px solid rgba(148,163,184,.1)'}}>
                    <div className="emp-card-title" style={{fontSize:14}}>Security</div>
                    <form onSubmit={changePassword} style={{display:'grid', gap:10, maxWidth:400}}>
                        <input className="lf-input" type="password" style={{paddingLeft:12}} placeholder="New password" value={passwordForm.password} onChange={e=>setPasswordForm({...passwordForm, password:e.target.value})}/>
                        <input className="lf-input" type="password" style={{paddingLeft:12}} placeholder="Confirm password" value={passwordForm.confirm} onChange={e=>setPasswordForm({...passwordForm, confirm:e.target.value})}/>
                        <button type="submit" className="lf-submit" style={{marginTop:0}}>Change Password</button>
                    </form>
                    <p style={{fontSize:11, color:'#64748b', marginTop:12}}>Department or role changes still require admin approval.</p>
                </div>
            </div>
        )}

        
        { navItem === 'admin' && <AdminPanel /> }

        <div className="footer">SEO Performance Hub · Employee Portal · April 2026</div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
{% endraw %}
</script>


</body>
</html>
