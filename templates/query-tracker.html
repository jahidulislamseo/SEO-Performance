<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Query & Lead Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Manrope',sans-serif;background:#09111f;color:#f1f5f9;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(95,133,162,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(95,133,162,.03) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:0}
.g1{position:fixed;top:-200px;left:-100px;width:600px;height:600px;background:radial-gradient(circle,rgba(99,102,241,.14) 0%,transparent 70%);pointer-events:none;z-index:0}
.g2{position:fixed;bottom:-150px;right:-80px;width:500px;height:500px;background:radial-gradient(circle,rgba(61,111,155,.10) 0%,transparent 70%);pointer-events:none;z-index:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.5)}}
@keyframes cardIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes mIn{from{opacity:0;transform:scale(.95) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}

/* HEADER */
.hdr{position:sticky;top:0;z-index:50;height:64px;padding:0 28px;display:flex;align-items:center;justify-content:space-between;gap:12px;background:rgba(9,17,31,.9);backdrop-filter:blur(24px);border-bottom:1px solid rgba(148,163,184,.18)}
.hl{display:flex;align-items:center;gap:12px}
.logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#6366f1,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 10px 24px rgba(99,102,241,.3)}
.htitle{font-size:16px;font-weight:900;letter-spacing:-.4px;background:linear-gradient(135deg,#f8fafc,#c7d3df,#6f879c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hsub{font-size:10px;color:#64748b;font-weight:600}
.hr{display:flex;align-items:center;gap:7px}
.hbtn{padding:6px 11px;border-radius:9px;background:rgba(61,111,155,.12);border:1px solid rgba(95,133,162,.28);color:#c4d4e2;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px;transition:all .2s;text-decoration:none}
.hbtn:hover{background:rgba(61,111,155,.2)}
.hbtn.green{background:rgba(15,118,110,.12);border-color:rgba(15,118,110,.28);color:#7ed2c7}
.hbtn.indigo{background:rgba(99,102,241,.12);border-color:rgba(99,102,241,.28);color:#a5b4fc}

/* MAIN */
.main{position:relative;z-index:5;padding:22px 28px;max-width:1300px;margin:0 auto}

/* KPI ROW */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
.kpi-box{background:rgba(14,24,38,.97);border:1px solid rgba(148,163,184,.18);border-radius:14px;padding:14px 16px;animation:cardIn .4s ease}
.kpi-num{font-size:26px;font-weight:900;letter-spacing:-1px;font-variant-numeric:tabular-nums}
.kpi-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:#64748b;margin-top:3px}

/* CONTROLS */
.controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.srch-wrap{position:relative;display:flex;align-items:center}
.srch-icon{position:absolute;left:10px;font-size:12px}
.srch{padding:8px 12px 8px 28px;border-radius:10px;background:rgba(14,24,38,.97);border:1px solid rgba(148,163,184,.18);color:#f1f5f9;font-size:12px;font-weight:600;font-family:inherit;outline:none;width:220px;transition:all .2s}
.srch:focus{border-color:rgba(99,102,241,.5)}
.sel{padding:8px 12px;border-radius:10px;background:rgba(14,24,38,.97);border:1px solid rgba(148,163,184,.18);color:#f1f5f9;font-size:11px;font-weight:700;font-family:inherit;outline:none;cursor:pointer}
.month-nav{display:flex;align-items:center;gap:8px}
.month-btn{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid rgba(148,163,184,.18);color:#f1f5f9;font-size:14px;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;justify-content:center}
.month-btn:hover{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.3)}
.month-label{font-size:13px;font-weight:800;color:#f1f5f9;min-width:80px;text-align:center}
.status-tabs{display:flex;gap:5px}
.stab{padding:7px 12px;border-radius:999px;border:1px solid rgba(148,163,184,.18);background:rgba(255,255,255,.035);color:#94a3b8;font-size:10px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .2s}
.stab:hover,.stab.active{background:rgba(47,93,138,.2);color:#d5e2ee;border-color:rgba(95,133,162,.34)}
.stab.st-new.active{background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.3);color:#60a5fa}
.stab.st-pending.active{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.3);color:#f59e0b}
.stab.st-closed.active{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.3);color:#34d399}
.ctrl-right{margin-left:auto}
.badge{font-size:11px;font-weight:700;color:#64748b;padding:6px 12px;border-radius:20px;background:rgba(255,255,255,.04);border:1px solid rgba(148,163,184,.12)}
.badge b{color:#f1f5f9}

/* ADD BUTTON */
.add-btn{padding:8px 14px;border-radius:10px;background:linear-gradient(135deg,#4f46e5,#7c3aed);border:none;color:#fff;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;gap:6px}
.add-btn:hover{opacity:.9;transform:translateY(-1px)}

/* QUERY LIST */
.query-list{display:flex;flex-direction:column;gap:12px}

/* QUERY CARD */
.qc{background:rgba(14,24,38,.97);border:1px solid rgba(148,163,184,.18);border-radius:16px;padding:18px 20px;animation:cardIn .4s ease;transition:border-color .2s}
.qc:hover{border-color:rgba(99,102,241,.3)}
.qc.new-q{border-left:3px solid #60a5fa}
.qc.pending-q{border-left:3px solid #f59e0b}
.qc.closed-q{border-left:3px solid #10b981}
.q-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.q-client-wrap{display:flex;align-items:center;gap:10px}
.q-av{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff;flex-shrink:0}
.q-client{font-size:15px;font-weight:800;color:#f1f5f9;letter-spacing:-.2px}
.q-date{font-size:10px;color:#64748b;margin-top:2px;font-weight:600}
.q-right{display:flex;align-items:center;gap:8px}
.status-badge{padding:4px 10px;border-radius:50px;font-size:10px;font-weight:800;display:inline-flex;align-items:center;gap:4px}
.st-new-b{background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.3)}
.st-pending-b{background:rgba(245,158,11,.12);color:#f59e0b;border:1px solid rgba(245,158,11,.28)}
.st-closed-b{background:rgba(16,185,129,.12);color:#34d399;border:1px solid rgba(16,185,129,.28)}
.q-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:12px}

.q-label{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:#475569;font-weight:800;margin-bottom:3px}
.q-val{font-size:12px;font-weight:700;color:#cbd5e1}
.q-val.hi{color:#10b981}
.q-val a{color:#6366f1;text-decoration:none}
.q-val a:hover{text-decoration:underline}
.q-remarks{margin-top:12px;padding-top:12px;border-top:1px dashed rgba(148,163,184,.12)}
.q-remarks-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#475569;margin-bottom:6px}
.q-remark-text{font-size:12px;color:#94a3b8;font-style:italic;line-height:1.6}
.q-actions{display:flex;gap:6px;margin-top:12px;padding-top:10px;border-top:1px solid rgba(148,163,184,.08)}
.q-action-btn{padding:5px 10px;border-radius:8px;font-size:10px;font-weight:800;cursor:pointer;font-family:inherit;border:1px solid;transition:all .2s}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(12px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{background:#090f1d;border:1px solid rgba(148,163,184,.18);border-radius:22px;padding:28px;width:100%;max-width:560px;box-shadow:0 40px 100px rgba(0,0,0,.65);animation:mIn .3s cubic-bezier(.4,0,.2,1)}
.modal-title{font-size:18px;font-weight:900;color:#f1f5f9;letter-spacing:-.4px;margin-bottom:18px}
.form-group{margin-bottom:14px}
.form-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:#cbd5e1;margin-bottom:5px;display:block}
.form-input{width:100%;padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(148,163,184,.18);color:#f1f5f9;font-size:13px;font-weight:600;font-family:inherit;outline:none;transition:border-color .2s}
.form-input:focus{border-color:rgba(99,102,241,.5)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.btn-cancel{padding:9px 16px;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid rgba(148,163,184,.18);color:#94a3b8;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-cancel:hover{background:rgba(255,255,255,.1)}
.btn-save{padding:9px 18px;border-radius:10px;background:linear-gradient(135deg,#4f46e5,#7c3aed);border:none;color:#fff;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-save:hover{opacity:.9}

.footer{text-align:center;padding:18px;border-top:1px solid rgba(148,163,184,.12);color:#475569;font-size:11px;margin-top:24px;position:relative;z-index:5}
</style>
</head>
<body>
<div class="g1"></div><div class="g2"></div>
<div id="root"></div>

<script type="text/babel">
const GRADS = [
  'linear-gradient(135deg,#4f46e5,#7c3aed)',
  'linear-gradient(135deg,#0f766e,#10b981)',
  'linear-gradient(135deg,#b45309,#f59e0b)',
  'linear-gradient(135deg,#be123c,#f43f5e)',
  'linear-gradient(135deg,#1d4ed8,#60a5fa)',
  'linear-gradient(135deg,#2f5d8a,#5f85a2)',
];
const gradFor = s => GRADS[s.charCodeAt(0) % GRADS.length];
const initials = s => s.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

const SAMPLE_QUERIES = [
  { id:1, client:'Dhaka Restaurant Group', contact:'+880 171 234 5678', source:'Facebook Messenger', service:'Local SEO Package', budget:'$150–200', member:'Jahidul Islam', date:'Apr 24', status:'new', remark:'Very interested, asked for proposal' },
  { id:2, client:'RajShahi IT Solutions', contact:'rajshahi.it@gmail.com', source:'WhatsApp', service:'National SEO — 3 Months', budget:'$400–600', member:'Rafiq Ahmed', date:'Apr 23', status:'pending', remark:'Sent proposal, waiting for approval' },
  { id:3, client:'Chittagong Fashion House', contact:'+880 181 987 6543', source:'Website Contact Form', service:'SMM Package — Instagram', budget:'$120', member:'Tanvir Hossain', date:'Apr 22', status:'closed', remark:'Closed — converted to order ORD-4900 ✅' },
  { id:4, client:'Sylhet Travels Agency', contact:'sylhet.travels@gmail.com', source:'Referral', service:'GMB Optimization × 5', budget:'$250', member:'Sara Rahman', date:'Apr 22', status:'new', remark:'' },
  { id:5, client:'Khulna Electronics Hub', contact:'+880 192 345 6789', source:'Facebook Group', service:'E-commerce SEO Setup', budget:'$300–500', member:'Omar Sheikh', date:'Apr 21', status:'pending', remark:'Client wants to negotiate price' },
  { id:6, client:'Barishal Medical Center', contact:'barisal.med@gmail.com', source:'LinkedIn', service:'Local SEO + GMB', budget:'$180', member:'Nadia Khan', date:'Apr 20', status:'new', remark:'First contact, needs follow-up call' },
  { id:7, client:'Mymensingh Agro Ltd', contact:'+880 155 678 9012', source:'Cold Outreach', service:'National SEO Campaign', budget:'$800', member:'Priya Das', date:'Apr 19', status:'closed', remark:'Lost — went with competitor ❌' },
];

const BLANK_FORM = { client:'', contact:'', source:'', service:'', budget:'', member:'', remark:'' };

const App = () => {
  const [queries, setQueries] = React.useState(SAMPLE_QUERIES);
  const [search, setSearch] = React.useState('');
  const [memberFilter, setMemberFilter] = React.useState('');
  const [statusFilter, setStatusFilter] = React.useState('all');
  const [monthIdx, setMonthIdx] = React.useState(3); // April
  const [showModal, setShowModal] = React.useState(false);
  const [form, setForm] = React.useState(BLANK_FORM);
  const [editId, setEditId] = React.useState(null);

  const members = [...new Set(SAMPLE_QUERIES.map(q=>q.member))];

  const filtered = queries.filter(q => {
    const qs = search.toLowerCase();
    const matchSearch = !search || q.client.toLowerCase().includes(qs) || q.member.toLowerCase().includes(qs) || q.service.toLowerCase().includes(qs);
    const matchMember = !memberFilter || q.member === memberFilter;
    const matchStatus = statusFilter === 'all' || q.status === statusFilter;
    return matchSearch && matchMember && matchStatus;
  });

  const counts = { all: queries.length, new: queries.filter(q=>q.status==='new').length, pending: queries.filter(q=>q.status==='pending').length, closed: queries.filter(q=>q.status==='closed').length };

  const setStatus = (id, status) => setQueries(prev=>prev.map(q=>q.id===id?{...q,status}:q));

  const openAdd = () => { setForm(BLANK_FORM); setEditId(null); setShowModal(true); };
  const openEdit = (q) => { setForm({client:q.client,contact:q.contact,source:q.source,service:q.service,budget:q.budget,member:q.member,remark:q.remark}); setEditId(q.id); setShowModal(true); };

  const saveForm = () => {
    if (!form.client.trim()) return;
    if (editId) {
      setQueries(prev=>prev.map(q=>q.id===editId?{...q,...form}:q));
    } else {
      setQueries(prev=>[{id:Date.now(),date:'Apr 27',status:'new',...form},...prev]);
    }
    setShowModal(false);
  };

  const statusConfig = {
    new:     { label:'🆕 New',     cls:'st-new-b',     border:'rgba(59,130,246,.3)',  bg:'rgba(59,130,246,.12)'  },
    pending: { label:'⏳ Pending', cls:'st-pending-b', border:'rgba(245,158,11,.3)',  bg:'rgba(245,158,11,.12)'  },
    closed:  { label:'✅ Closed',  cls:'st-closed-b',  border:'rgba(16,185,129,.3)', bg:'rgba(16,185,129,.12)' },
  };

  return (
    <>
      <header className="hdr">
        <div className="hl">
          <div className="logo">🚀</div>
          <div>
            <div className="htitle">Query & Lead Tracker</div>
            <div className="hsub">GEO Rankers · Sales Assistant</div>
          </div>
        </div>
        <div className="hr">
          <button className="hbtn">↻ Refresh</button>
          <a className="hbtn green" href="index.html">← Dashboard</a>
          <button className="add-btn" onClick={openAdd}>+ Add Query</button>
        </div>
      </header>

      <div className="main">
        {/* KPI row */}
        <div className="kpi-row">
          <div className="kpi-box"><div className="kpi-num" style={{color:'#a5b4fc'}}>{counts.all}</div><div className="kpi-lbl">Total Queries</div></div>
          <div className="kpi-box"><div className="kpi-num" style={{color:'#60a5fa'}}>{counts.new}</div><div className="kpi-lbl">🆕 New</div></div>
          <div className="kpi-box"><div className="kpi-num" style={{color:'#f59e0b'}}>{counts.pending}</div><div className="kpi-lbl">⏳ Pending</div></div>
          <div className="kpi-box"><div className="kpi-num" style={{color:'#10b981'}}>{counts.closed}</div><div className="kpi-lbl">✅ Closed</div></div>
          <div className="kpi-box"><div className="kpi-num" style={{color:'#34d399'}}>{queries.filter(q=>q.status==='closed'&&q.remark.includes('✅')).length}</div><div className="kpi-lbl">💰 Converted</div></div>
        </div>

        {/* Controls */}
        <div className="controls">
          <div className="srch-wrap">
            <span className="srch-icon">🔍</span>
            <input className="srch" placeholder="Search client, member or service..." value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          <select className="sel" value={memberFilter} onChange={e=>setMemberFilter(e.target.value)}>
            <option value="">All Members</option>
            {members.map(m=><option key={m} value={m}>{m}</option>)}
          </select>
          <div className="month-nav">
            <button className="month-btn" onClick={()=>setMonthIdx(i=>Math.max(0,i-1))}>‹</button>
            <div className="month-label">{MONTHS[monthIdx]}</div>
            <button className="month-btn" onClick={()=>setMonthIdx(i=>Math.min(11,i+1))}>›</button>
          </div>
          <div className="status-tabs">
            {[['all','All'],['new','🆕 New'],['pending','⏳ Pending'],['closed','✅ Closed']].map(([v,lbl])=>(
              <button key={v} className={`stab st-${v}${statusFilter===v?' active':''}`} onClick={()=>setStatusFilter(v)}>{lbl}</button>
            ))}
          </div>
          <div className="ctrl-right">
            <span className="badge">Showing <b>{filtered.length}</b> of {queries.length}</span>
          </div>
        </div>

        {/* Query list */}
        <div className="query-list">
          {filtered.map(q => {
            const sc = statusConfig[q.status];
            return (
              <div key={q.id} className={`qc ${q.status}-q`} data-screen-label="Query Card">
                <div className="q-header">
                  <div className="q-client-wrap">
                    <div className="q-av" style={{background:gradFor(q.client)}}>{initials(q.client)}</div>
                    <div>
                      <div className="q-client">{q.client}</div>
                      <div className="q-date">Received {q.date} · by {q.member}</div>
                    </div>
                  </div>
                  <div className="q-right">
                    <span className={`status-badge ${sc.cls}`}>{sc.label}</span>
                  </div>
                </div>

                <div className="q-grid">
                  <div className="q-item"><div className="q-label">Service</div><div className="q-val">{q.service}</div></div>
                  <div className="q-item"><div className="q-label">Budget</div><div className="q-val hi">{q.budget}</div></div>
                  <div className="q-item"><div className="q-label">Source</div><div className="q-val">{q.source}</div></div>
                  <div className="q-item"><div className="q-label">Contact</div><div className="q-val"><a href={q.contact.includes('@')?`mailto:${q.contact}`:`tel:${q.contact.replace(/\s/g,'')}`}>{q.contact}</a></div></div>
                </div>

                {q.remark && (
                  <div className="q-remarks">
                    <div className="q-remarks-label">Remarks</div>
                    <div className="q-remark-text">{q.remark}</div>
                  </div>
                )}

                <div className="q-actions">
                  {q.status !== 'new' && (
                    <button className="q-action-btn" style={{background:'rgba(59,130,246,.1)',borderColor:'rgba(59,130,246,.25)',color:'#60a5fa'}} onClick={()=>setStatus(q.id,'new')}>🆕 Mark New</button>
                  )}
                  {q.status !== 'pending' && (
                    <button className="q-action-btn" style={{background:'rgba(245,158,11,.1)',borderColor:'rgba(245,158,11,.25)',color:'#f59e0b'}} onClick={()=>setStatus(q.id,'pending')}>⏳ Mark Pending</button>
                  )}
                  {q.status !== 'closed' && (
                    <button className="q-action-btn" style={{background:'rgba(16,185,129,.1)',borderColor:'rgba(16,185,129,.25)',color:'#34d399'}} onClick={()=>setStatus(q.id,'closed')}>✅ Mark Closed</button>
                  )}
                  <button className="q-action-btn" style={{background:'rgba(99,102,241,.1)',borderColor:'rgba(99,102,241,.25)',color:'#a5b4fc',marginLeft:'auto'}} onClick={()=>openEdit(q)}>✏️ Edit</button>
                  <button className="q-action-btn" style={{background:'rgba(239,68,68,.08)',borderColor:'rgba(239,68,68,.2)',color:'#f87171'}} onClick={()=>setQueries(prev=>prev.filter(x=>x.id!==q.id))}>🗑️</button>
                </div>
              </div>
            );
          })}
          {filtered.length === 0 && (
            <div style={{textAlign:'center',padding:'48px 0',color:'#475569'}}>
              <div style={{fontSize:32,marginBottom:10}}>🚀</div>
              <div style={{fontWeight:700}}>No queries match your filters</div>
              <button style={{marginTop:12,padding:'8px 16px',borderRadius:10,background:'linear-gradient(135deg,#4f46e5,#7c3aed)',border:'none',color:'#fff',fontWeight:800,cursor:'pointer',fontFamily:'inherit'}} onClick={openAdd}>+ Add First Query</button>
            </div>
          )}
        </div>
      </div>

      <footer className="footer">SEO Performance Hub · Query & Lead Tracker · GEO Rankers · April 2026</footer>

      {/* Add/Edit Modal */}
      <div className={`overlay${showModal?' open':''}`} onClick={e=>e.target.classList.contains('overlay')&&setShowModal(false)}>
        <div className="modal">
          <div className="modal-title">{editId ? '✏️ Edit Query' : '+ New Query'}</div>
          <div className="form-grid">
            <div className="form-group">
              <label className="form-label">Client Name</label>
              <input className="form-input" placeholder="e.g. Dhaka Restaurant" value={form.client} onChange={e=>setForm({...form,client:e.target.value})}/>
            </div>
            <div className="form-group">
              <label className="form-label">Contact</label>
              <input className="form-input" placeholder="+880... or email" value={form.contact} onChange={e=>setForm({...form,contact:e.target.value})}/>
            </div>
            <div className="form-group">
              <label className="form-label">Source</label>
              <input className="form-input" placeholder="e.g. Facebook Messenger" value={form.source} onChange={e=>setForm({...form,source:e.target.value})}/>
            </div>
            <div className="form-group">
              <label className="form-label">Service</label>
              <input className="form-input" placeholder="e.g. Local SEO Package" value={form.service} onChange={e=>setForm({...form,service:e.target.value})}/>
            </div>
            <div className="form-group">
              <label className="form-label">Budget</label>
              <input className="form-input" placeholder="e.g. $150–200" value={form.budget} onChange={e=>setForm({...form,budget:e.target.value})}/>
            </div>
            <div className="form-group">
              <label className="form-label">Assigned Member</label>
              <select className="form-input" value={form.member} onChange={e=>setForm({...form,member:e.target.value})}>
                <option value="">Select member...</option>
                {members.map(m=><option key={m} value={m}>{m}</option>)}
              </select>
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Remarks</label>
            <textarea className="form-input" rows={3} placeholder="Notes, follow-up status, client intent..." value={form.remark} onChange={e=>setForm({...form,remark:e.target.value})} style={{resize:'vertical'}}/>
          </div>
          <div className="modal-actions">
            <button className="btn-cancel" onClick={()=>setShowModal(false)}>Cancel</button>
            <button className="btn-save" onClick={saveForm}>{editId?'Save Changes':'Add Query'}</button>
          </div>
        </div>
      </div>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
