<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Manrope',sans-serif;background:#09111f;padding:20px;display:flex;flex-direction:column;gap:12px}
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
.row{display:flex;gap:8px;flex-wrap:wrap}
.swatch{display:flex;flex-direction:column;gap:6px;align-items:flex-start}
.chip{width:80px;height:54px;border-radius:10px;border:1px solid rgba(148,163,184,.15)}
.lbl{font-size:10px;font-weight:800;color:#94a3b8;letter-spacing:.5px}
.val{font-size:9px;color:#64748b;font-weight:600}
.title{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:#475569;margin-bottom:4px}
</style></head>
<body>
<div class="title">Navy / Background Scale</div>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#09111f"></div><div class="lbl">Navy 950</div><div class="val">#09111f</div></div>
  <div class="swatch"><div class="chip" style="background:#0a121e"></div><div class="lbl">Navy 900</div><div class="val">#0a121e</div></div>
  <div class="swatch"><div class="chip" style="background:#0e1826"></div><div class="lbl">Navy 800</div><div class="val">#0e1826</div></div>
  <div class="swatch"><div class="chip" style="background:#112030"></div><div class="lbl">Navy 700</div><div class="val">#112030</div></div>
</div>
<div class="title" style="margin-top:4px">Slate / Text Scale</div>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#f1f5f9"></div><div class="lbl">Slate 100</div><div class="val">#f1f5f9</div></div>
  <div class="swatch"><div class="chip" style="background:#cbd5e1"></div><div class="lbl">Slate 300</div><div class="val">#cbd5e1</div></div>
  <div class="swatch"><div class="chip" style="background:#94a3b8"></div><div class="lbl">Slate 400</div><div class="val">#94a3b8</div></div>
  <div class="swatch"><div class="chip" style="background:#475569"></div><div class="lbl">Slate 600</div><div class="val">#475569</div></div>
</div>
</body></html>
