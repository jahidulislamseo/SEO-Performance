<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Manrope',sans-serif;background:#09111f;padding:20px;display:flex;flex-direction:column;gap:14px}
.title{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:#475569}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:50px;font-size:10px;font-weight:800}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1px}
.dot{width:5px;height:5px;border-radius:50%}
.sticker{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700}
</style></head>
<body>
<div class="title">Status Badges</div>
<div class="row">
  <span class="badge" style="background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:#34d399">✅ Delivered</span>
  <span class="badge" style="background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);color:#fbbf24">⏳ WIP</span>
  <span class="badge" style="background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#f87171">❌ Cancelled</span>
  <span class="badge" style="background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.3);color:#a5b4fc">🔄 Revision</span>
</div>
<div class="title">Live / Status Tags</div>
<div class="row">
  <span class="badge" style="background:rgba(15,118,110,.12);border:1px solid rgba(15,118,110,.32);color:#89d8cf"><span class="dot" style="background:#7ed2c7;box-shadow:0 0 6px rgba(126,210,199,.7)"></span>Live</span>
  <span class="tag" style="background:rgba(47,93,138,.15);border:1px solid rgba(95,133,162,.28);color:#c4d4e2">DEPT OVERVIEW</span>
  <span class="tag" style="background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:#7ed2c7">TARGET HIT</span>
  <span class="sticker" style="background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.25);color:#a5b4fc">Target: $1,100/member</span>
</div>
<div class="title">Rank Badges</div>
<div class="row">
  <span class="badge" style="background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.35);color:#fbbf24">#1 🥇</span>
  <span class="badge" style="background:rgba(148,163,184,.1);border:1px solid rgba(148,163,184,.25);color:#cbd5e1">#2 🥈</span>
  <span class="badge" style="background:rgba(180,120,60,.12);border:1px solid rgba(180,120,60,.28);color:#d4a574">#3 🥉</span>
  <span class="badge" style="background:rgba(148,163,184,.08);border:1px solid rgba(148,163,184,.15);color:#94a3b8">#4</span>
  <span class="badge" style="background:rgba(148,163,184,.08);border:1px solid rgba(148,163,184,.15);color:#94a3b8">#12</span>
</div>
</body></html>
