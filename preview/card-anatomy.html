<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Manrope',sans-serif;background:#09111f;padding:20px;display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start}
.title{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:#475569;width:100%;margin-bottom:-4px}
/* base card */
.card{background:rgba(14,24,38,.97);border:1px solid rgba(148,163,184,.18);border-radius:18px;padding:16px 20px;width:180px;position:relative;overflow:hidden}
/* with gradient overlay */
.card-grad::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(47,93,138,.12) 0%,rgba(95,133,162,.06) 50%,transparent 100%)}
.card-body{position:relative}
/* glass */
.glass-card{background:rgba(255,255,255,.035);backdrop-filter:blur(20px);border:1px solid rgba(148,163,184,.18);border-radius:14px;padding:12px 16px;width:180px}
/* modal preview */
.modal-prev{background:#090f1d;border:1px solid rgba(148,163,184,.18);border-radius:22px;padding:16px;width:220px;box-shadow:0 40px 100px rgba(0,0,0,.65)}
.modal-tag{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:#94a3b8;margin-bottom:8px}
.close-btn{width:28px;height:28px;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid rgba(148,163,184,.18);color:#94a3b8;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;float:right}
.lbl{font-size:10px;color:#475569;font-weight:700;margin-top:8px}
</style></head>
<body>
<div class="title">Card Anatomy</div>
<!-- Base card -->
<div>
  <div class="card">
    <div class="lbl" style="margin-top:0;margin-bottom:4px;font-size:8px;color:#2f5d8a">Base card</div>
    <div style="font-size:12px;font-weight:700;color:#f1f5f9">Card title</div>
    <div style="font-size:10px;color:#94a3b8;margin-top:2px">Subtitle or metadata</div>
  </div>
  <div class="lbl">bg · border · r-18</div>
</div>
<!-- Card with gradient -->
<div>
  <div class="card card-grad">
    <div class="card-body">
      <div style="font-size:8px;color:#2f5d8a;font-weight:800;margin-bottom:4px">With gradient overlay</div>
      <div style="font-size:12px;font-weight:700;color:#f1f5f9">Dept Card</div>
      <div style="font-size:10px;color:#94a3b8;margin-top:2px">::before overlay</div>
    </div>
  </div>
  <div class="lbl">+ ::before gradient</div>
</div>
<!-- Glass -->
<div>
  <div class="glass-card">
    <div style="font-size:8px;color:#5f85a2;font-weight:800;margin-bottom:4px">Glass surface</div>
    <div style="font-size:12px;font-weight:700;color:#f1f5f9">Header / Nav</div>
    <div style="font-size:10px;color:#94a3b8;margin-top:2px">backdrop-filter: blur</div>
  </div>
  <div class="lbl">glass · blur(24px)</div>
</div>
<!-- Modal -->
<div>
  <div class="modal-prev">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div class="modal-tag">Modal</div>
      <div class="close-btn">✕</div>
    </div>
    <div style="font-size:12px;font-weight:700;color:#f1f5f9">Overlay panel</div>
    <div style="font-size:10px;color:#94a3b8;margin-top:4px">r-26 · shadow-modal · backdrop blur</div>
  </div>
  <div class="lbl">r-26 · dark · heavy shadow</div>
</div>
</body></html>
