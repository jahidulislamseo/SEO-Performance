<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Manrope',sans-serif;background:#09111f;padding:20px;display:flex;flex-direction:column;gap:12px}
.title{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:#475569;margin-bottom:6px}
.row{display:flex;gap:6px;align-items:flex-end;flex-wrap:wrap}
.item{display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{background:linear-gradient(135deg,#2f5d8a,#5f85a2);border-radius:3px}
.lbl{font-size:9px;font-weight:700;color:#64748b}
.val{font-size:8px;font-weight:600;color:#475569}
.divider{height:1px;background:rgba(148,163,184,.1)}
.radii{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.rchip{background:rgba(47,93,138,.2);border:1px solid rgba(95,133,162,.3)}
.rlbl{font-size:9px;font-weight:700;color:#64748b;margin-top:4px;text-align:center}
.rval{font-size:8px;font-weight:600;color:#475569;text-align:center}
</style></head>
<body>
<div class="title">Spacing Scale</div>
<div class="row">
  <div class="item"><div class="bar" style="width:8px;height:4px"></div><div class="lbl">sp-1</div><div class="val">4px</div></div>
  <div class="item"><div class="bar" style="width:8px;height:6px"></div><div class="lbl">sp-2</div><div class="val">6px</div></div>
  <div class="item"><div class="bar" style="width:8px;height:8px"></div><div class="lbl">sp-3</div><div class="val">8px</div></div>
  <div class="item"><div class="bar" style="width:8px;height:10px"></div><div class="lbl">sp-4</div><div class="val">10px</div></div>
  <div class="item"><div class="bar" style="width:8px;height:12px"></div><div class="lbl">sp-5</div><div class="val">12px</div></div>
  <div class="item"><div class="bar" style="width:8px;height:16px"></div><div class="lbl">sp-7</div><div class="val">16px</div></div>
  <div class="item"><div class="bar" style="width:8px;height:20px"></div><div class="lbl">sp-8</div><div class="val">20px</div></div>
  <div class="item"><div class="bar" style="width:8px;height:24px"></div><div class="lbl">sp-9</div><div class="val">24px</div></div>
  <div class="item"><div class="bar" style="width:8px;height:32px"></div><div class="lbl">sp-11</div><div class="val">32px</div></div>
  <div class="item"><div class="bar" style="width:8px;height:48px"></div><div class="lbl">sp-13</div><div class="val">48px</div></div>
</div>
<div class="divider"></div>
<div class="title">Border Radius Scale</div>
<div class="radii">
  <div class="item"><div class="rchip" style="width:36px;height:36px;border-radius:6px"></div><div class="rlbl">xs</div><div class="rval">6px</div></div>
  <div class="item"><div class="rchip" style="width:36px;height:36px;border-radius:9px"></div><div class="rlbl">sm</div><div class="rval">9px</div></div>
  <div class="item"><div class="rchip" style="width:40px;height:36px;border-radius:12px"></div><div class="rlbl">md</div><div class="rval">12px</div></div>
  <div class="item"><div class="rchip" style="width:44px;height:36px;border-radius:18px"></div><div class="rlbl">lg</div><div class="rval">18px</div></div>
  <div class="item"><div class="rchip" style="width:48px;height:36px;border-radius:22px"></div><div class="rlbl">xl</div><div class="rval">22px</div></div>
  <div class="item"><div class="rchip" style="width:52px;height:36px;border-radius:26px"></div><div class="rlbl">2xl</div><div class="rval">26px</div></div>
  <div class="item"><div class="rchip" style="width:56px;height:36px;border-radius:999px"></div><div class="rlbl">full</div><div class="rval">pill</div></div>
</div>
</body></html>
