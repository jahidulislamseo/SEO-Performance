<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SEO Performance Hub — UI Kit</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
/* ── RESET & BASE ── */
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Manrope',sans-serif;
  background:
    radial-gradient(circle at top left,rgba(61,111,155,.16),transparent 32%),
    radial-gradient(circle at bottom right,rgba(15,118,110,.10),transparent 28%),
    #09111f;
  color:#f1f5f9;
  min-height:100vh;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(95,133,162,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(95,133,162,.03) 1px,transparent 1px);
  background-size:50px 50px;pointer-events:none;z-index:0;
}
/* ── GLOWS ── */
.g1{position:fixed;top:-250px;left:-150px;width:700px;height:700px;background:radial-gradient(circle,rgba(61,111,155,.16) 0%,transparent 70%);pointer-events:none;z-index:0}
.g2{position:fixed;bottom:-200px;right:-100px;width:600px;height:600px;background:radial-gradient(circle,rgba(15,118,110,.10) 0%,transparent 70%);pointer-events:none;z-index:0}
.g3{position:fixed;top:50%;left:60%;width:500px;height:500px;background:radial-gradient(circle,rgba(194,138,44,.07) 0%,transparent 70%);pointer-events:none;z-index:0}
/* ── LIGHT MODE ── */
[data-theme="light"]{--bg:#fdfdfd;--card:#ffffff;--card2:#f3f4f6;--gb:rgba(0,0,0,.12);--glass:rgba(0,0,0,.04);--accent:#0f766e;--a2:#0d9488;--text:#111827;--muted:#4b5563;--m2:#374151;--hdr-bg:rgba(255,255,255,.95);--grad-1:rgba(15,118,110,.08);--grad-2:rgba(61,111,155,.06)}
[data-theme="light"] body{background:#fdfdfd}
[data-theme="light"] body::before{background-image:linear-gradient(rgba(0,0,0,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.02) 1px,transparent 1px);background-size:50px 50px}
/* ── ANIMATIONS ── */
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.5)}}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(200%)}}
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes mIn{from{opacity:0;transform:scale(.95) translateY(18px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes tIn{from{opacity:0;transform:translateY(12px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:50;height:68px;padding:0 32px;display:flex;align-items:center;justify-content:space-between;gap:12px;background:rgba(9,17,31,.85);backdrop-filter:blur(24px);border-bottom:1px solid rgba(148,163,184,.18)}
[data-theme="light"] .hdr{background:rgba(255,255,255,.95)}
.hl{display:flex;align-items:center;gap:12px}
.logo{width:42px;height:42px;border-radius:12px;flex-shrink:0;background:linear-gradient(135deg,#2f5d8a,#5f85a2);display:flex;align-items:center;justify-content:center;font-size:19px;box-shadow:0 14px 28px rgba(18,33,54,.35)}
.ht h1{font-size:18px;font-weight:900;letter-spacing:-.5px;background:linear-gradient(135deg,#f8fafc 20%,#c7d3df 55%,#6f879c 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
[data-theme="light"] .ht h1{background:none;-webkit-text-fill-color:#111827}
.ht p{font-size:11px;color:#cbd5e1}
[data-theme="light"] .ht p{color:#374151}
.hdr-center{display:flex;align-items:center}
.hr{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hbtn{padding:6px 12px;border-radius:9px;background:rgba(61,111,155,.12);border:1px solid rgba(95,133,162,.28);color:#c4d4e2;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;display:flex;align-items:center;gap:5px;white-space:nowrap}
.hbtn:hover{background:rgba(61,111,155,.2);border-color:rgba(95,133,162,.45)}
.hbtn.green{background:rgba(15,118,110,.12);border-color:rgba(15,118,110,.28);color:#7ed2c7}
.hbtn.green:hover{background:rgba(15,118,110,.22)}
.hbtn.yellow{background:rgba(194,138,44,.12);border-color:rgba(194,138,44,.3);color:#e7c98e}
.hbtn.manager{background:rgba(123,135,148,.13);border-color:rgba(123,135,148,.3);color:#d2d9e1}
.theme-btn{width:36px;height:36px;border-radius:10px;border:1px solid rgba(148,163,184,.18);background:rgba(255,255,255,.035);color:#f1f5f9;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s}
.theme-btn:hover{background:rgba(95,133,162,.15)}
.live-badge{display:flex;align-items:center;gap:6px;padding:5px 11px;border-radius:50px;background:rgba(15,118,110,.12);border:1px solid rgba(15,118,110,.32);font-size:11px;font-weight:700;color:#89d8cf}
.ldot{width:6px;height:6px;border-radius:50%;background:#7ed2c7;box-shadow:0 0 8px rgba(126,210,199,.7);animation:pulse 2s infinite}
.clock{font-size:12px;font-weight:700;color:#cbd5e1;font-variant-numeric:tabular-nums}
/* ── COUNTDOWN BAR ── */
.countdown-bar{position:relative;z-index:5;padding:10px 32px;background:linear-gradient(90deg,rgba(47,93,138,.14),rgba(95,133,162,.08),rgba(15,118,110,.1));border-bottom:1px solid rgba(148,163,184,.18);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.cd-left{display:flex;align-items:center;gap:20px}
.cd-item{display:flex;align-items:center;gap:8px;font-size:12px;color:#cbd5e1}
.cd-item b{color:#f1f5f9;font-size:14px;font-weight:800}
.cd-month-track{max-width:200px;width:120px;height:5px;background:rgba(148,163,184,.18);border-radius:50px;overflow:hidden}
.cd-month-fill{height:100%;background:linear-gradient(90deg,#2f5d8a,#4f8ea6);border-radius:50px;transition:width .5s}
/* ── PAGE NAV ── */
.page-nav{position:sticky;top:68px;z-index:24;padding:10px 32px;background:rgba(9,17,31,.85);backdrop-filter:blur(18px);border-bottom:1px solid rgba(148,163,184,.18)}
[data-theme="light"] .page-nav{background:rgba(255,255,255,.95)}
.page-nav-inner{max-width:1700px;margin:0 auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.page-nav-btn{padding:8px 12px;border-radius:999px;border:1px solid rgba(148,163,184,.18);background:rgba(255,255,255,.035);color:#94a3b8;font-size:11px;font-weight:800;letter-spacing:.2px;cursor:pointer;font-family:inherit;transition:all .2s;text-decoration:none}
.page-nav-btn:hover{color:#f1f5f9;border-color:rgba(95,133,162,.4)}
.page-nav-btn.active{background:rgba(47,93,138,.2);color:#d5e2ee;border-color:rgba(95,133,162,.34)}
/* ── MAIN ── */
.main{position:relative;z-index:5;padding:24px 32px;max-width:1700px;margin:0 auto}
.dash-section{scroll-margin-top:128px;margin-bottom:24px}
/* ── SECTION TITLE ── */
.stitle{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.8px;color:#cbd5e1;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.stitle::after{content:'';flex:1;height:1px;background:rgba(148,163,184,.18)}
/* ── DEPT CARD ── */
.dept-card{background:rgba(14,24,38,.97);border:1px solid rgba(148,163,184,.18);border-radius:22px;padding:24px 28px;margin-bottom:20px;position:relative;overflow:hidden}
[data-theme="light"] .dept-card{background:#fff}
.dept-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(47,93,138,.12) 0%,rgba(95,133,162,.06) 50%,transparent 100%)}
.dept-inner{position:relative;display:grid;grid-template-columns:1fr auto;gap:20px;align-items:center}
.dept-tag{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:#cbd5e1;margin-bottom:5px}
.dept-heading{font-size:24px;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,#f3f6fa,#c6d2de,#879caf);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:2px}
[data-theme="light"] .dept-heading{background:linear-gradient(135deg,#0f172a,#1e3a5f,#2f5d8a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.dept-sub{font-size:12px;color:#cbd5e1;margin-bottom:14px}
.dept-track{height:10px;background:rgba(148,163,184,.18);border-radius:50px;overflow:hidden;margin-bottom:6px;position:relative}
.dept-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,#2f5d8a,#5f85a2,#4f8ea6);transition:width 1.8s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.dept-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.28),transparent);animation:shimmer 2.5s linear infinite}
.dept-tlabels{display:flex;justify-content:space-between;font-size:10px;font-weight:700;color:#64748b}
.dept-kpis{display:flex;gap:20px;margin-top:14px}
.dkpi-val{font-size:18px;font-weight:900;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
.dkpi-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:#64748b;margin-top:2px}
.dept-ring-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.dept-ring-container{position:relative;width:96px;height:96px}
.dept-ring-container svg{position:absolute;top:0;left:0}
.dept-ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.dept-ring-pct{font-size:18px;font-weight:900;color:#f1f5f9}
.dept-ring-lbl{font-size:10px;color:#94a3b8;font-weight:700}
/* ── KPI STRIP ── */
.kpi-strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.kpi-card{background:rgba(14,24,38,.97);border:1px solid rgba(148,163,184,.18);border-radius:16px;padding:14px 18px;animation:cardIn .4s ease}
[data-theme="light"] .kpi-card{background:#fff}
.kpi-tag{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:#94a3b8;margin-bottom:6px}
.kpi-val{font-size:26px;font-weight:900;letter-spacing:-1px;font-variant-numeric:tabular-nums}
.kpi-sub{font-size:10px;font-weight:600;color:#64748b;margin-top:4px}
/* ── SPOTLIGHT ── */
.spotlight{background:rgba(14,24,38,.97);border:1px solid rgba(148,163,184,.18);border-radius:22px;padding:24px;margin-bottom:24px}
[data-theme="light"] .spotlight{background:#fff}
.spot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.spot-card{background:rgba(255,255,255,.035);border:1px solid rgba(148,163,184,.12);border-radius:16px;padding:16px;text-align:center;position:relative;overflow:hidden;transition:all .2s;cursor:pointer}
.spot-card:hover{border-color:rgba(95,133,162,.35);transform:translateY(-2px)}
.spot-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.spot-av{width:52px;height:52px;border-radius:14px;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff}
.spot-rank{position:absolute;top:10px;right:10px;font-size:16px}
.spot-name{font-size:13px;font-weight:800;color:#f1f5f9;margin-bottom:2px}
.spot-team{font-size:10px;color:#94a3b8;margin-bottom:8px}
.spot-amt{font-size:20px;font-weight:900;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
/* ── TEAM GRID ── */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-bottom:24px}
.tc{background:rgba(14,24,38,.97);border:1px solid rgba(148,163,184,.18);border-radius:18px;padding:18px 20px;transition:all .2s;animation:cardIn .4s ease}
[data-theme="light"] .tc{background:#fff}
.tc:hover{transform:translateY(-2px);border-color:rgba(95,133,162,.3)}
.tc-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.tc-icon{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;flex-shrink:0}
.tc-name{font-size:15px;font-weight:800;color:#f1f5f9;letter-spacing:-.3px}
.tc-meta{font-size:11px;color:#94a3b8}
.tc-kpis{display:flex;gap:16px;margin-bottom:12px}
.tc-kval{font-size:18px;font-weight:900;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
.tc-klbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#64748b;margin-top:2px}
.tc-prog-row{display:flex;align-items:center;gap:8px}
.tc-track{flex:1;height:6px;background:rgba(148,163,184,.18);border-radius:50px;overflow:hidden}
.tc-fill{height:100%;border-radius:50px;position:relative;overflow:hidden;transition:width 1s ease}
.tc-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);animation:shimmer 2.5s linear infinite}
.tc-pct{font-size:12px;font-weight:800;min-width:36px;text-align:right}
/* ── CONTROLS ── */
.controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px;position:relative;z-index:5}
.search-wrap{position:relative;display:flex;align-items:center}
.si{position:absolute;left:10px;font-size:13px}
.search-input{padding:8px 12px 8px 30px;border-radius:10px;background:rgba(14,24,38,.97);border:1px solid rgba(148,163,184,.18);color:#f1f5f9;font-size:12px;font-weight:600;outline:none;font-family:inherit;width:180px;transition:all .2s}
[data-theme="light"] .search-input{background:#fff;color:#111827;border-color:rgba(0,0,0,.15)}
.search-input:focus{border-color:rgba(95,133,162,.5);background:rgba(14,24,38,1)}
.filter-tabs{display:flex;gap:5px}
.ftab{padding:7px 12px;border-radius:999px;border:1px solid rgba(148,163,184,.18);background:rgba(255,255,255,.035);color:#94a3b8;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .2s}
.ftab.active,.ftab:hover{background:rgba(47,93,138,.2);color:#d5e2ee;border-color:rgba(95,133,162,.34)}
.seg{display:flex;border:1px solid rgba(148,163,184,.18);border-radius:10px;overflow:hidden}
.seg-btn{padding:7px 12px;background:none;border:none;color:#94a3b8;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .2s}
.seg-btn.active{background:rgba(47,93,138,.25);color:#d5e2ee}
/* ── MEMBERS GRID ── */
.members-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:20px}
/* ── MEMBER CARD ── */
.mc{background:rgba(14,24,38,.97);border:1px solid rgba(148,163,184,.18);border-radius:18px;padding:18px;animation:cardIn .4s ease;transition:all .2s}
[data-theme="light"] .mc{background:#fff}
.mc:hover{border-color:rgba(95,133,162,.4);transform:translateY(-2px)}
.mc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.mc-av{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;flex-shrink:0}
.mc-rank{font-size:9px;font-weight:800;color:#94a3b8;background:rgba(148,163,184,.1);border:1px solid rgba(148,163,184,.2);padding:3px 7px;border-radius:20px}
.mc-name{font-size:13px;font-weight:800;color:#f1f5f9;letter-spacing:-.2px}
[data-theme="light"] .mc-name{color:#111827}
.mc-team{font-size:10px;font-weight:600;color:#94a3b8}
.mc-prog{margin:10px 0 8px}
.prog-labels{display:flex;justify-content:space-between;margin-bottom:5px}
.mc-track{height:6px;background:rgba(148,163,184,.18);border-radius:50px;overflow:hidden}
.mc-fill{height:100%;border-radius:50px;position:relative;overflow:hidden;transition:width 1s ease}
.mc-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.28),transparent);animation:shimmer 2.5s linear infinite}
.mc-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.stat{background:rgba(255,255,255,.03);border:1px solid rgba(148,163,184,.1);border-radius:8px;padding:6px 8px}
[data-theme="light"] .stat{background:rgba(0,0,0,.03);border-color:rgba(0,0,0,.08)}
.stat-val{font-size:13px;font-weight:800;font-variant-numeric:tabular-nums}
.stat-lbl{font-size:9px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-top:1px}
/* ── LEADERBOARD ── */
.lb-wrap{background:rgba(14,24,38,.97);border:1px solid rgba(148,163,184,.18);border-radius:22px;overflow:hidden}
[data-theme="light"] .lb-wrap{background:#fff}
.lb-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid rgba(148,163,184,.18)}
.lb-head h2{font-size:16px;font-weight:800;color:#f1f5f9;letter-spacing:-.3px}
[data-theme="light"] .lb-head h2{color:#111827}
.lb-acts{display:flex;gap:8px}
.lb-table{width:100%;border-collapse:collapse}
.lb-table th{padding:10px 16px;text-align:left;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:#64748b;border-bottom:1px solid rgba(148,163,184,.18)}
.lb-table td{padding:12px 16px;border-bottom:1px solid rgba(148,163,184,.08);font-size:13px;font-weight:600;color:#f1f5f9;transition:background .2s}
[data-theme="light"] .lb-table td{color:#111827}
.lb-table tr:hover td{background:rgba(255,255,255,.03)}
.lb-table tr:last-child td{border-bottom:none}
.lb-top td{background:rgba(47,93,138,.06)}
.team-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:rgba(47,93,138,.15);border:1px solid rgba(95,133,162,.2);color:#7ea8c4}
/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(14px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{background:#090f1d;border:1px solid rgba(148,163,184,.18);border-radius:26px;width:100%;max-width:760px;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 40px 100px rgba(0,0,0,.65);animation:mIn .3s cubic-bezier(.4,0,.2,1)}
.m-hdr{padding:20px 24px;border-bottom:1px solid rgba(148,163,184,.18)}
.m-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.m-av-wrap{display:flex;align-items:center;gap:12px}
.m-av{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;flex-shrink:0}
.m-name{font-size:18px;font-weight:900;color:#f1f5f9;letter-spacing:-.4px}
.m-sub{font-size:12px;color:#94a3b8;margin-top:2px}
.m-kpis{display:flex;gap:14px;margin-top:8px}
.close-btn{width:34px;height:34px;border-radius:9px;flex-shrink:0;background:rgba(255,255,255,.05);border:1px solid rgba(148,163,184,.18);color:#94a3b8;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:inherit}
.close-btn:hover{background:rgba(239,68,68,.15);color:#ef4444;border-color:rgba(239,68,68,.3)}
.m-tabs{display:flex;gap:6px;flex-wrap:wrap}
.mtab{padding:6px 14px;border-radius:999px;border:1px solid rgba(148,163,184,.18);background:rgba(255,255,255,.035);color:#94a3b8;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.mtab.active{background:rgba(47,93,138,.2);color:#d5e2ee;border-color:rgba(95,133,162,.34)}
.m-body{flex:1;overflow-y:auto;padding:16px 24px;display:flex;flex-direction:column;gap:10px}
/* project row */
.proj-row{background:rgba(255,255,255,.03);border:1px solid rgba(148,163,184,.1);border-radius:12px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;transition:background .2s}
.proj-row:hover{background:rgba(255,255,255,.06)}
.proj-title{font-size:13px;font-weight:700;color:#f1f5f9}
.proj-meta{font-size:11px;color:#64748b;margin-top:2px}
.proj-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.proj-amt{font-size:14px;font-weight:900;font-variant-numeric:tabular-nums}
.sbadge{display:inline-flex;padding:3px 9px;border-radius:50px;font-size:10px;font-weight:800}
/* ── FOOTER ── */
.footer{text-align:center;padding:20px 32px;border-top:1px solid rgba(148,163,184,.18);color:#64748b;font-size:11px;position:relative;z-index:5;display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap}
/* ── EMPTY / PAGER ── */
.pager{display:flex;align-items:center;justify-content:center;gap:6px;padding:16px 0}
.page-btn{padding:6px 12px;border-radius:8px;border:1px solid rgba(148,163,184,.18);background:rgba(255,255,255,.035);color:#94a3b8;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.page-btn.active,.page-btn:hover{background:rgba(47,93,138,.2);color:#d5e2ee;border-color:rgba(95,133,162,.34)}
</style>
</head>
<body>
<div class="g1"></div><div class="g2"></div><div class="g3"></div>

<div id="root"></div>

<script type="text/babel" src="MemberCard.jsx"></script>
<script type="text/babel" src="KpiCard.jsx"></script>
<script type="text/babel" src="TeamCard.jsx"></script>
<script type="text/babel" src="Leaderboard.jsx"></script>
<script type="text/babel" src="Header.jsx"></script>

<script type="text/babel">
// ── SAMPLE DATA ──
const MEMBERS = [
  { name: 'Jahidul Islam',  team: 'Geo Rankers', deliveredAmt: 1240, wipAmt: 380,  delivered: 16, wip: 4, cancelled: 1 },
  { name: 'Rafiq Ahmed',    team: 'Geo Rankers', deliveredAmt: 1085, wipAmt: 210,  delivered: 14, wip: 2, cancelled: 0 },
  { name: 'Sara Rahman',    team: 'Rank Riser',  deliveredAmt: 970,  wipAmt: 480,  delivered: 12, wip: 5, cancelled: 2 },
  { name: 'Nadia Khan',     team: 'Rank Riser',  deliveredAmt: 860,  wipAmt: 320,  delivered: 11, wip: 3, cancelled: 0 },
  { name: 'Omar Sheikh',    team: 'Search Apex', deliveredAmt: 790,  wipAmt: 560,  delivered: 10, wip: 6, cancelled: 1 },
  { name: 'Priya Das',      team: 'Search Apex', deliveredAmt: 720,  wipAmt: 290,  delivered: 9,  wip: 3, cancelled: 0 },
  { name: 'Tanvir Hossain', team: 'SMM',         deliveredAmt: 680,  wipAmt: 410,  delivered: 8,  wip: 4, cancelled: 1 },
  { name: 'Mim Akter',      team: 'SMM',         deliveredAmt: 610,  wipAmt: 195,  delivered: 7,  wip: 2, cancelled: 0 },
  { name: 'Bilal Chowdhury',team: 'Geo Rankers', deliveredAmt: 540,  wipAmt: 330,  delivered: 7,  wip: 4, cancelled: 2 },
  { name: 'Lina Begum',     team: 'Rank Riser',  deliveredAmt: 490,  wipAmt: 260,  delivered: 6,  wip: 3, cancelled: 0 },
  { name: 'Farhan Islam',   team: 'Search Apex', deliveredAmt: 410,  wipAmt: 180,  delivered: 5,  wip: 2, cancelled: 1 },
  { name: 'Ritu Paul',      team: 'SMM',         deliveredAmt: 350,  wipAmt: 140,  delivered: 4,  wip: 2, cancelled: 0 },
];

const TEAMS = ['Geo Rankers', 'Rank Riser', 'Search Apex', 'SMM'];

// ── APP ──
const App = () => {
  const [activeSection, setActiveSection] = React.useState('overview');
  const [selectedMember, setSelectedMember] = React.useState(null);
  const [teamFilter, setTeamFilter] = React.useState('All');
  const [searchQ, setSearchQ] = React.useState('');
  const [modalTab, setModalTab] = React.useState('all');

  const totalDelivered = MEMBERS.reduce((s, m) => s + m.deliveredAmt, 0);
  const totalWip       = MEMBERS.reduce((s, m) => s + m.wipAmt, 0);
  const totalDeliveredCount = MEMBERS.reduce((s, m) => s + m.delivered, 0);
  const totalCancelled = MEMBERS.reduce((s, m) => s + m.cancelled, 0);

  const filtered = MEMBERS.filter(m =>
    (teamFilter === 'All' || m.team === teamFilter) &&
    m.name.toLowerCase().includes(searchQ.toLowerCase())
  );

  const topPerformers = [...MEMBERS].sort((a,b) => b.deliveredAmt - a.deliveredAmt).slice(0,4);

  // Sample projects for modal
  const sampleProjects = [
    { title: 'Local SEO Package — Dhaka Restaurant', type: 'Local SEO', amt: 120, status: 'Delivered', date: 'Apr 18' },
    { title: 'Google Maps Optimization × 3', type: 'GMB', amt: 90, status: 'Delivered', date: 'Apr 15' },
    { title: 'National SEO — E-commerce Store', type: 'National SEO', amt: 250, status: 'WIP', date: 'Apr 22' },
    { title: 'Citation Building Package', type: 'Citations', amt: 75, status: 'Delivered', date: 'Apr 10' },
    { title: 'Press Release Distribution', type: 'PR', amt: 80, status: 'Revision', date: 'Apr 20' },
    { title: 'Competitor Analysis Report', type: 'Research', amt: 60, status: 'Cancelled', date: 'Apr 8' },
  ];

  const filteredProjects = modalTab === 'all' ? sampleProjects : sampleProjects.filter(p => p.status === modalTab);

  const statusBadge = (s) => {
    const map = {
      Delivered: { bg: 'rgba(16,185,129,.12)', border: 'rgba(16,185,129,.3)', color: '#34d399', icon: '✅' },
      WIP:       { bg: 'rgba(245,158,11,.12)', border: 'rgba(245,158,11,.3)', color: '#fbbf24', icon: '⏳' },
      Revision:  { bg: 'rgba(99,102,241,.12)', border: 'rgba(99,102,241,.3)', color: '#a5b4fc', icon: '🔄' },
      Cancelled: { bg: 'rgba(239,68,68,.12)',  border: 'rgba(239,68,68,.3)',  color: '#f87171', icon: '❌' },
    };
    const c = map[s] || map.WIP;
    return React.createElement('span', {
      className: 'sbadge',
      style: { background: c.bg, border: `1px solid ${c.border}`, color: c.color }
    }, `${c.icon} ${s}`);
  };

  const sections = ['overview','performers','teams','members','leaderboard'];

  return React.createElement(React.Fragment, null,
    // Header
    React.createElement(Header, {
      dept: 'GEO Rankers',
      month: 'April 2026',
      onRefresh: () => {},
      onManagerView: () => {}
    }),

    // Countdown bar
    React.createElement('div', { className: 'countdown-bar' },
      React.createElement('div', { className: 'cd-left' },
        React.createElement('div', { className: 'cd-item' }, '📅 ', React.createElement('b', null, 'April 2026')),
        React.createElement('div', { className: 'cd-item' }, '⏳ ', React.createElement('b', null, '4'), ' days left'),
        React.createElement('div', { className: 'cd-month-track' },
          React.createElement('div', { className: 'cd-month-fill', style: { width: '87%' } })
        ),
        React.createElement('div', { className: 'cd-item' }, '📈 Month: ', React.createElement('b', null, '87%'), ' elapsed')
      )
    ),

    // Page nav
    React.createElement('div', { className: 'page-nav' },
      React.createElement('div', { className: 'page-nav-inner' },
        [['overview','Overview'],['performers','Top Performers'],['teams','Teams'],['members','Members'],['leaderboard','Leaderboard']].map(([id,label]) =>
          React.createElement('button', {
            key: id,
            className: `page-nav-btn${activeSection===id?' active':''}`,
            onClick: () => setActiveSection(id)
          }, label)
        ),
        React.createElement('button', { className: 'page-nav-btn', style: { background:'rgba(16,185,129,.12)',borderColor:'rgba(16,185,129,.3)',color:'#7ed2c7' } }, '📦 Delivery Tracker ↗'),
        React.createElement('button', { className: 'page-nav-btn', style: { background:'rgba(99,102,241,.12)',borderColor:'rgba(99,102,241,.3)',color:'#a5b4fc' } }, '🚀 Query Tracker ↗'),
        React.createElement('button', { className: 'page-nav-btn', style: { background:'rgba(37,99,235,.12)',borderColor:'rgba(37,99,235,.3)',color:'#93c5fd' } }, '👤 Employee Portal ↗')
      )
    ),

    // Main content
    React.createElement('main', { className: 'main' },

      // Overview section
      (activeSection === 'overview' || activeSection === 'performers' || activeSection === 'teams' || activeSection === 'members' || activeSection === 'leaderboard') &&
      React.createElement(React.Fragment, null,

        // Dept overview
        activeSection === 'overview' && React.createElement('section', { className: 'dash-section', id: 'overview-section', 'data-screen-label': '01 Overview' },
          React.createElement(DeptOverview, {
            total: 35000,
            delivered: totalDelivered,
            wip: totalWip,
            cancelled: MEMBERS.reduce((s,m)=>s+m.cancelled,0) * 65,
            members: MEMBERS.length,
            dept: 'GEO Rankers',
            month: 'April 2026'
          })
        ),

        // KPI strip
        activeSection === 'overview' && React.createElement('div', { className: 'kpi-strip' },
          React.createElement(KpiCard, { label:'Total Delivered', value:`$${totalDelivered.toLocaleString()}`, sub:`${totalDeliveredCount} orders`, color:'#10b981', icon:'✅' }),
          React.createElement(KpiCard, { label:'WIP Pipeline',    value:`$${totalWip.toLocaleString()}`,     sub:`Active orders`, color:'#f59e0b', icon:'⏳' }),
          React.createElement(KpiCard, { label:'Cancelled',       value:`$${totalCancelled * 65}`,            sub:`${totalCancelled} orders`, color:'#ef4444', icon:'❌' }),
          React.createElement(KpiCard, { label:'Members',         value:MEMBERS.length,                       sub:`Across 4 teams`, color:'#cbd5e1', icon:'👥' }),
          React.createElement(KpiCard, { label:'Monthly Target',  value:'$35,000',                            sub:`$${(1100).toLocaleString()}/member`, color:'#7ea8c4', icon:'🎯' })
        ),

        // Top performers
        activeSection === 'performers' && React.createElement('section', { className: 'dash-section', 'data-screen-label': '02 Performers' },
          React.createElement('div', { className: 'stitle' }, '🏆 Top Performers'),
          React.createElement('div', { className: 'spotlight' },
            React.createElement('div', { className: 'spot-grid' },
              topPerformers.map((m, i) => {
                const medals = ['🥇','🥈','🥉','🏅'];
                const colors = [
                  { from: '#f59e0b', to: '#fbbf24', accent: '#fde68a' },
                  { from: '#94a3b8', to: '#cbd5e1', accent: '#e2e8f0' },
                  { from: '#b45309', to: '#d97706', accent: '#fcd34d' },
                  { from: '#2f5d8a', to: '#5f85a2', accent: '#7ea8c4' },
                ][i] || { from: '#2f5d8a', to: '#5f85a2', accent: '#7ea8c4' };
                return React.createElement('div', {
                  key: m.name,
                  className: 'spot-card',
                  style: { '--accent-from': colors.from },
                  onClick: () => setSelectedMember(m)
                },
                  React.createElement('div', { className: 'spot-rank' }, medals[i]),
                  React.createElement('div', { className: 'spot-av', style: { background: `linear-gradient(135deg,${colors.from},${colors.to})` } }, getInitials(m.name)),
                  React.createElement('div', { className: 'spot-name' }, m.name),
                  React.createElement('div', { className: 'spot-team' }, m.team),
                  React.createElement('div', { className: 'spot-amt', style: { color: colors.accent } }, `$${m.deliveredAmt.toLocaleString()}`)
                );
              })
            )
          )
        ),

        // Teams
        activeSection === 'teams' && React.createElement('section', { className: 'dash-section', 'data-screen-label': '03 Teams' },
          React.createElement('div', { className: 'stitle' }, '👥 Teams'),
          React.createElement('div', { className: 'team-grid' },
            TEAMS.map(t => React.createElement(TeamCard, { key: t, team: t, members: MEMBERS.filter(m => m.team === t) }))
          )
        ),

        // Members
        activeSection === 'members' && React.createElement('section', { className: 'dash-section', 'data-screen-label': '04 Members' },
          // Controls
          React.createElement('div', { className: 'controls' },
            React.createElement('div', { className: 'search-wrap' },
              React.createElement('span', { className: 'si' }, '🔍'),
              React.createElement('input', {
                className: 'search-input',
                placeholder: 'Search member...',
                value: searchQ,
                onChange: e => setSearchQ(e.target.value)
              })
            ),
            React.createElement('div', { className: 'filter-tabs' },
              ['All', ...TEAMS].map(t =>
                React.createElement('button', {
                  key: t,
                  className: `ftab${teamFilter===t?' active':''}`,
                  onClick: () => setTeamFilter(t)
                }, t)
              )
            )
          ),
          React.createElement('div', { className: 'stitle' }, '👥 Team Members'),
          React.createElement('div', { className: 'members-grid' },
            filtered.sort((a,b) => b.deliveredAmt - a.deliveredAmt).map((m, i) =>
              React.createElement(MemberCard, {
                key: m.name,
                member: m,
                rank: MEMBERS.sort((a,b)=>b.deliveredAmt-a.deliveredAmt).findIndex(x=>x.name===m.name)+1,
                onClick: () => { setSelectedMember(m); setModalTab('all'); }
              })
            )
          )
        ),

        // Leaderboard
        activeSection === 'leaderboard' && React.createElement('section', { className: 'dash-section', 'data-screen-label': '05 Leaderboard' },
          React.createElement(Leaderboard, { members: MEMBERS, target: 1100 })
        )
      )
    ),

    // Footer
    React.createElement('footer', { className: 'footer' },
      React.createElement('span', null, 'SEO Performance Hub'),
      React.createElement('span', null, '·'),
      React.createElement('span', null, 'GEO Rankers Dept'),
      React.createElement('span', null, '·'),
      React.createElement('span', null, 'April 2026'),
      React.createElement('span', null, '·'),
      React.createElement('span', null, 'Mull Performance Design System')
    ),

    // Member modal
    React.createElement('div', {
      className: `overlay${selectedMember?' open':''}`,
      onClick: e => { if(e.target.classList.contains('overlay')) setSelectedMember(null); }
    },
      selectedMember && React.createElement('div', { className: 'modal' },
        React.createElement('div', { className: 'm-hdr' },
          React.createElement('div', { className: 'm-top' },
            React.createElement('div', { className: 'm-av-wrap' },
              React.createElement('div', { className: 'm-av', style: { background: avatarGradient(selectedMember.name) } }, getInitials(selectedMember.name)),
              React.createElement('div', null,
                React.createElement('div', { className: 'm-name' }, selectedMember.name),
                React.createElement('div', { className: 'm-sub' }, selectedMember.team),
                React.createElement('div', { className: 'm-kpis', style: { display:'flex', gap:14, marginTop:6 } },
                  React.createElement('span', { style:{fontSize:13,fontWeight:800,color:'#10b981'} }, `$${selectedMember.deliveredAmt.toLocaleString()} delivered`),
                  React.createElement('span', { style:{fontSize:13,fontWeight:700,color:'#f59e0b'} }, `$${selectedMember.wipAmt.toLocaleString()} WIP`)
                )
              )
            ),
            React.createElement('button', { className: 'close-btn', onClick: () => setSelectedMember(null) }, '✕')
          ),
          React.createElement('div', { className: 'm-tabs' },
            ['all','Delivered','WIP','Revision','Cancelled'].map(t =>
              React.createElement('button', {
                key: t,
                className: `mtab${modalTab===t?' active':''}`,
                onClick: () => setModalTab(t)
              }, t === 'all' ? 'All' : t === 'Delivered' ? '✅ Delivered' : t === 'WIP' ? '⏳ WIP' : t === 'Revision' ? '🔄 Revision' : '❌ Cancelled')
            )
          )
        ),
        React.createElement('div', { className: 'm-body' },
          filteredProjects.map((p, i) =>
            React.createElement('div', { key: i, className: 'proj-row' },
              React.createElement('div', null,
                React.createElement('div', { className: 'proj-title' }, p.title),
                React.createElement('div', { className: 'proj-meta' }, `${p.type} · ${p.date}`)
              ),
              React.createElement('div', { className: 'proj-right' },
                React.createElement('span', { className: 'proj-amt', style: { color: p.status==='Delivered' ? '#10b981' : p.status==='WIP' ? '#f59e0b' : '#94a3b8' } }, `$${p.amt}`),
                statusBadge(p.status)
              )
            )
          )
        )
      )
    )
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
